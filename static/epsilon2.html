<script language=javascript>
var a,b,voices;
let chosenVoice=0;

function run()
{
	go(b.join(" "));
	setTimeout(run,20000);
}
function findZira()
{	
	for (let i = 0; i < voices.length; i++) {
		if( !voices[i].localService ) continue;
		if( voices[i].name.indexOf("Zira") != -1 ) {
			chosenVoice = i;
			break;
		}
	}
}
function go(txt)
{
	[a,f] = gen(txt, document.forms[0].flavor.value, document.forms[0].changing.checked);
	s = document.forms[0].spokenword.checked;
	document.getElementById('genarea').innerText = a;
	saveGen(a);
	b = a.split(' ').slice(-6);
	document.forms[0].txt.value = b.join(" ");
	saveText();
	document.forms[0].flavor.value = f;
	saveFlavor();

  if( s ) {
    let utter = new SpeechSynthesisUtterance(a);
    utter.voice = voices[ chosenVoice ];
    utter.rate = 1.0;
    window.speechSynthesis.speak(utter);
  }
}
</script>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src='js/qrandom.js'></script>
<script language=javascript>
var rNums = [];
var rC = 0, rndMax=2000;
let cC = 0;
let myseed = "stay";

function qRandom() {
  if (rNums.length < rndMax) {
    startRandoms();
  }
  rC++;
  if (rC >= rNums.length) rC -= rNums.length;
  cC += Math.floor(rNums[rC] * 50);
  while (cC >= rNums.length) cC -= rNums.length;
  let x = (rNums[rC] * 0.1 + rNums[cC] * 0.9);

  return x;
}

function startRandoms() {
  myseed = Math.random(); // initial random seed
  while (rNums.length < rndMax) {
    rNums.push(myseed * Math.random());
  }
}
</script>

<script language=javascript>
window.onload = function() {
	if( 'flavor' in window.localStorage ) {
		document.forms[0].flavor.value = window.localStorage['flavor'];
	}

	if( 'gen' in window.localStorage ) {
		document.getElementById('genarea').innerText = window.localStorage['gen'];
	} else if( 'text' in window.localStorage ) {
		document.forms[0].txt.value = window.localStorage['text'];
		go( document.forms[0].txt.value );
	} else {
		go( document.forms[0].txt.value );
	}
}
let registered=false;
document.getElementById('spokenword').addEventListener('change', ()=>{
	voices = window.speechSynthesis.getVoices();
	if( voices.length != 0 ) {
		findZira();
	} else if( !registered ) {
		registered=true;
		speechSynthesis.addEventListener('voiceschanged', () => {
    	voices = window.speechSynthesis.getVoices();
    	findZira();
		});
	}
});
function saveGen(msg)
{
	window.localStorage['gen'] = msg;
}
function saveText()
{
	window.localStorage['text'] = document.forms[0].txt.value;
}
function saveFlavor()
{
	window.localStorage['flavor'] = document.forms[0].flavor.value;
}
function renderLibrary()
{
	// first we need to create a stage
	var stage = new Konva.Stage({
	  container: 'container',   // id of container <div>
	  width: 500,
	  height: 500
	});

	// then create layer
	var layer = new Konva.Layer();

	// create our shape
	var circle = new Konva.Circle({
	  x: stage.width() / 2,
	  y: stage.height() / 2,
	  radius: 70,
	  fill: 'red',
	  stroke: 'black',
	  strokeWidth: 4
	});

	// add the shape to the layer
	layer.add(circle);

	// add the layer to the stage
	stage.add(layer);

	// draw the image
	layer.draw();
}
</script>
