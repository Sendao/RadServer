<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Filled Cube with Particle Shell</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #1a1a1a; 
        }
        canvas { width: 100%; height: 100vh; display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: Arial; }
        #toast { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 5px; 
            display: none; 
        }
    </style>
</head>
<body>
<div id="info">Use mouse to rotate, wheel to zoom</div>
    <div id="toast"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.173.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        document.addEventListener("DOMContentLoaded", init);

        function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Mouse controls
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            const rotation = { x: 0, y: 0 };

            document.addEventListener('mousedown', (e) => { 
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const delta = {
                        x: (e.clientX - previousMousePosition.x) * 0.005,
                        y: (e.clientY - previousMousePosition.y) * 0.005
                    };
                    rotation.y += delta.x;
                    rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotation.x + delta.y));
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });
            document.addEventListener('mouseup', () => { isDragging = false; });

            // Zoom controls
            let targetDistance = 2;
            const minDistance = 0.5;
            const maxDistance = 5;
            document.addEventListener('wheel', (e) => {
                targetDistance += e.deltaY * 0.005;
                targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
            });

            // Filled cube points with ghosts
            const cubeSize = 0.5;
            const cubeResolution = 10;
            const ghostCount = 3;
            const cubePoints = cubeResolution * cubeResolution * cubeResolution;
            const totalCubePoints = cubePoints * (1 + ghostCount);
            const cubeGeometry = new THREE.BufferGeometry();
            const cubeVertices = new Float32Array(totalCubePoints * 3);
            const cubeScales = new Float32Array(totalCubePoints);
            const cubePhases = new Float32Array(totalCubePoints);
            const cubeGhostOffsets = new Float32Array(totalCubePoints);

            for (let x = 0; x < cubeResolution; x++) {
                for (let y = 0; y < cubeResolution; y++) {
                    for (let z = 0; z < cubeResolution; z++) {
                        const baseIndex = (x * cubeResolution * cubeResolution + y * cubeResolution + z);
                        const phase = Math.random() * Math.PI * 2;
                        const posX = (x / (cubeResolution - 1) - 0.5) * cubeSize;
                        const posY = (y / (cubeResolution - 1) - 0.5) * cubeSize;
                        const posZ = (z / (cubeResolution - 1) - 0.5) * cubeSize;

                        // Main point
                        let i = baseIndex * (1 + ghostCount);
                        cubeVertices[i * 3] = posX;
                        cubeVertices[i * 3 + 1] = posY;
                        cubeVertices[i * 3 + 2] = posZ;
                        cubeScales[i] = 0.25;
                        cubePhases[i] = phase;
                        cubeGhostOffsets[i] = 0.0;

                        // Ghost points
                        for (let g = 1; g <= ghostCount; g++) {
                            i = baseIndex * (1 + ghostCount) + g;
                            cubeVertices[i * 3] = posX;
                            cubeVertices[i * 3 + 1] = posY;
                            cubeVertices[i * 3 + 2] = posZ;
                            cubeScales[i] = 0.25;
                            cubePhases[i] = phase;
                            cubeGhostOffsets[i] = g * 0.033; // Time offset for each ghost
                        }
                    }
                }
            }

            cubeGeometry.setAttribute('position', new THREE.BufferAttribute(cubeVertices, 3));
            cubeGeometry.setAttribute('scale', new THREE.BufferAttribute(cubeScales, 1));
            cubeGeometry.setAttribute('phase', new THREE.BufferAttribute(cubePhases, 1));
            cubeGeometry.setAttribute('ghostOffset', new THREE.BufferAttribute(cubeGhostOffsets, 1));

            const cubeShader = {
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    in float scale;
                    in float phase;
                    in float ghostOffset;
                    out float ghostOffset2;
                    out vec3 worldPosition;
                    uniform float time;
                    void main() {
                        float speedOffset = phase * 0.2;
                        float t = time - ghostOffset;
                        float pulse = sin(t * (1.0 + speedOffset) + phase) * 0.5 + 0.5;
                        vec3 transformed = position + vec3(
                            cos(t * (1.0 + speedOffset) + phase) * 0.2,
                            sin(t * (1.0 + speedOffset) + phase) * 0.2,
                            sin(t * (1.0 + speedOffset) + phase) * 0.2
                        );
                        worldPosition = transformed; // Pass world position to fragment shader
                        gl_PointSize = scale * 60.0 * pulse * (1.0 - ghostOffset * 3.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                        ghostOffset2 = ghostOffset;
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    in float ghostOffset2;
                    in vec3 worldPosition; // Passed from vertex shader
                    void main() {
                        vec2 uv = gl_PointCoord - vec2(0.5);
                        float dist = length(uv);
                        if (dist > 0.5) discard;
                        float pulse = sin(time) * 0.3 + 0.7;
                        vec4 baseColor = vec4(0.2, 0.8, 0.9, (1.0 - dist * 1.5) * 0.8);
                        float fade = 1.0 - ghostOffset2 * 0.7;
                        // Add depth-based glow
                        float distFromCenter = length(worldPosition);
                        float glowFactor = 1.0 - distFromCenter * 0.5; // Brighter near center
                        gl_FragColor = vec4(baseColor.rgb * fade * glowFactor, baseColor.a) * pulse;
                    }
                `
            };

            const cubeMaterial = new THREE.PointsMaterial({
                size: 0.15,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            cubeMaterial.onBeforeCompile = (shader) => {
                shader.uniforms.time = cubeShader.uniforms.time;
                shader.vertexShader = cubeShader.vertexShader;
                shader.fragmentShader = cubeShader.fragmentShader;
            };

            const cube = new THREE.Points(cubeGeometry, cubeMaterial);
            scene.add(cube);

            // Spherical shell with ghosts
            const shellCount = 2000;
            const totalShellPoints = shellCount * (1 + ghostCount);
            const shellGeometry = new THREE.BufferGeometry();
            const shellPositions = new Float32Array(totalShellPoints * 3);
            const shellScales = new Float32Array(totalShellPoints);
            const shellPhases = new Float32Array(totalShellPoints);
            const shellGhostOffsets = new Float32Array(totalShellPoints);

            for (let i = 0; i < shellCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 0.125;
                const phase = Math.random() * Math.PI * 2;
                const posX = radius * Math.sin(phi) * Math.cos(theta);
                const posY = radius * Math.sin(phi) * Math.sin(theta);
                const posZ = radius * Math.cos(phi);

                // Main point
                let idx = i * (1 + ghostCount);
                shellPositions[idx * 3] = posX;
                shellPositions[idx * 3 + 1] = posY;
                shellPositions[idx * 3 + 2] = posZ;
                shellScales[idx] = 0.08 + Math.random() * 0.05;
                shellPhases[idx] = phase;
                shellGhostOffsets[idx] = 0.0;

                // Ghost points
                for (let g = 1; g <= ghostCount; g++) {
                    idx = i * (1 + ghostCount) + g;
                    shellPositions[idx * 3] = posX;
                    shellPositions[idx * 3 + 1] = posY;
                    shellPositions[idx * 3 + 2] = posZ;
                    shellScales[idx] = 0.08 + Math.random() * 0.05;
                    shellPhases[idx] = phase;
                    shellGhostOffsets[idx] = g * 0.033;
                }
            }

            shellGeometry.setAttribute('position', new THREE.BufferAttribute(shellPositions, 3));
            shellGeometry.setAttribute('scale', new THREE.BufferAttribute(shellScales, 1));
            shellGeometry.setAttribute('phase', new THREE.BufferAttribute(shellPhases, 1));
            shellGeometry.setAttribute('ghostOffset', new THREE.BufferAttribute(shellGhostOffsets, 1));

            const shellShader = {
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    in float scale;
                    in float phase;
                    in float ghostOffset;
                    out float ghostOffset2;
                    out vec3 worldPosition;
                    uniform float time;
                    void main() {
                        float t = time - ghostOffset;
                        float pulse = sin(t + phase) * 0.5 + 0.5;
                        vec3 transformed = position + vec3(
                            cos(t + phase) * 0.15,
                            sin(t + phase) * 0.15,
                            sin(t + phase * 0.5) * 0.15
                        );
                        worldPosition = transformed;
                        gl_PointSize = scale * 50.0 * pulse * (1.0 - ghostOffset * 3.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                        ghostOffset2 = ghostOffset;
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    in float ghostOffset2;
                    in vec3 worldPosition;
                    void main() {
                        vec2 uv = gl_PointCoord - vec2(0.5);
                        float dist = length(uv);
                        if (dist > 0.5) discard;
                        float pulse = sin(time) * 0.3 + 0.7;
                        vec4 baseColor = vec4(0.9, 0.2, 0.2, (1.0 - dist * 1.5) * 0.8);
                        float fade = 1.0 - ghostOffset2 * 0.7;
                        float distFromCenter = length(worldPosition);
                        float glowFactor = 1.0 - distFromCenter * 0.5;
                        gl_FragColor = vec4(baseColor.rgb * fade * glowFactor, baseColor.a) * pulse;
                    }
                `
            };

            const shellMaterial = new THREE.PointsMaterial({
                size: 0.1,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            shellMaterial.onBeforeCompile = (shader) => {
                shader.uniforms.time = shellShader.uniforms.time;
                shader.vertexShader = shellShader.vertexShader;
                shader.fragmentShader = shellShader.fragmentShader;
            };

            const shell = new THREE.Points(shellGeometry, shellMaterial);
            scene.add(shell);

            // Original orbiting particles
            let particleShaders = [];
            function particleCross(xCos, yCos, zCos, fragColor='0.2, 0.6, 0.2, (1.0 - dist * 1.5) * 0.8')
            {
                const particleCount = 2000;
                const totalParticlePoints = particleCount * (1 + ghostCount);
                const particlesGeometry = new THREE.BufferGeometry();
                const positions = new Float32Array(totalParticlePoints * 3);
                const scales = new Float32Array(totalParticlePoints);
                const phases = new Float32Array(totalParticlePoints);
                const ghostOffsets = new Float32Array(totalParticlePoints);

                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const radius = 1 + Math.sin(angle * 4) * 0.5;
                    const phase = Math.random() * Math.PI * 2;
                    let posX, posY, posZ;
                    if( xCos ) {
                        posX = Math.cos(angle) * radius;
                    } else {
                        posX = Math.sin(angle) * radius;
                    }
                    if( yCos ) {
                        posY = Math.cos(angle) * radius;
                    } else {
                        posY = Math.sin(angle) * radius;
                    }
                    if( zCos ) {
                        posZ = Math.cos(angle) * radius;
                    } else {
                        posZ = Math.sin(angle) * radius;
                    }

                    // Main point
                    let idx = i * (1 + ghostCount);
                    positions[idx * 3] = posX;
                    positions[idx * 3 + 1] = posY;
                    positions[idx * 3 + 2] = posZ;
                    scales[idx] = 0.05 + Math.random() * 0.2;
                    phases[idx] = phase;
                    ghostOffsets[idx] = 0.0;

                    // Ghost points
                    for (let g = 1; g <= ghostCount; g++) {
                        idx = i * (1 + ghostCount) + g;
                        positions[idx * 3] = posX;
                        positions[idx * 3 + 1] = posY;
                        positions[idx * 3 + 2] = posZ;
                        scales[idx] = 0.05 + Math.random() * 0.2;
                        phases[idx] = phase;
                        ghostOffsets[idx] = g * 0.033;
                    }
                }

                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                particlesGeometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));
                particlesGeometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
                particlesGeometry.setAttribute('ghostOffset', new THREE.BufferAttribute(ghostOffsets, 1));

                let vecBuffer = '';
                if( xCos ) vecBuffer += "cos(t+phase)*0.1,\n";
                else vecBuffer += "sin(t+phase)*0.1,\n";
                if( yCos ) vecBuffer += "cos(t+phase)*0.1,\n";
                else vecBuffer += "sin(t+phase)*0.1,\n";
                if( zCos ) vecBuffer += "cos(t+phase)*0.1";
                else vecBuffer += "sin(t+phase)*0.1";

                const particleShader = {
                    uniforms: { time: { value: 0 } },
                    vertexShader: `
                        in float scale;
                        in float phase;
                        in float ghostOffset;
                        out float ghostOffset2;
                        out vec3 worldPosition;
                        uniform float time;
                        void main() {
                            float t = time - ghostOffset;
                            float pulse = sin(t + phase) * 0.5 + 0.5;
                            vec3 transformed = position + vec3(
                        ${vecBuffer}
                            );
                            worldPosition = transformed;
                            gl_PointSize = scale * 45.0 * pulse * (1.0 - ghostOffset * 3.0);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                        ghostOffset2 = ghostOffset;
                        }
                    `,
                    fragmentShader: `
                        uniform float time;
                        in float ghostOffset2;
                        in vec3 worldPosition;
                        void main() {
                            vec2 uv = gl_PointCoord - vec2(0.5);
                            float dist = length(uv);
                            if (dist > 0.5) discard;
                            float pulse = sin(time) * 0.3 + 0.7;
                            vec4 baseColor = vec4(${fragColor});
                            float fade = 1.0 - ghostOffset2 * 0.7;
                            float distFromCenter = length(worldPosition);
                            float glowFactor = 1.0 - distFromCenter * 0.5;
                            gl_FragColor = vec4(baseColor.rgb * fade * glowFactor, baseColor.a) * pulse;
                        }
                    `
                };

                const particleMaterial = new THREE.PointsMaterial({
                    size: 0.5,
                    transparent: true,
                    blending: THREE.AdditiveBlending
                });
                particleMaterial.onBeforeCompile = function(mine, shader) {
                    shader.uniforms.time = mine.uniforms.time;
                    shader.vertexShader = mine.vertexShader;
                    shader.fragmentShader = mine.fragmentShader;
                }.bind(null, particleShader);

                const particles = new THREE.Points(particlesGeometry, particleMaterial);
                scene.add(particles);
                particleShaders.push(particleShader);
            }

            particleCross(true,false,false);
            particleCross(false,true,false);
            particleCross(false,false,true);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Camera position with lerp
            const currentPosition = new THREE.Vector3(0, 0, 1);
            camera.position.copy(currentPosition);

            // Animation
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                
                time += 0.02;
                cubeShader.uniforms.time.value = time;
                shellShader.uniforms.time.value = time;
                for( let i=0; i<particleShaders.length; i++ ) {
                    particleShaders[i].uniforms.time.value = time;
                }

                // Calculate target position
                const targetX = Math.sin(rotation.y) * targetDistance;
                const targetY = Math.sin(rotation.x) * targetDistance;
                const targetZ = Math.cos(rotation.y) * Math.cos(rotation.x) * targetDistance;
                const targetPosition = new THREE.Vector3(targetX, targetY, targetZ);

                // Smoothly interpolate camera position
                currentPosition.lerp(targetPosition, 0.1);
                camera.position.copy(currentPosition);
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }
            animate();

            // Resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Error handling
            try {
                renderer.render(scene, camera);
            } catch (e) {
                const toast = document.getElementById('toast');
                toast.textContent = 'Rendering error: ' + e.message;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 3000);
            }
        }
    </script>
</body>
</html>
