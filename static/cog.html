<script language=javascript>
/*

Todo:

 - fix line numbers will overflow scroll area at 1000
 - fix deleting large amounts of text will show scroll area limitations

 - change pre tabs to spaces and set param tab=1
 - process tabs correctly in copy/save
 
  - hover over filename to show full path
  - save files
  - remove 'login' from statusbar
  - statusbar should pop open with history and linter bugs

  - local file save on selection

 - bookmarks via ctrl+b integrated w/ vfs
 - user database storage (via ed.html)
 - layout editor (generate html)
  - various box layouts
  - active data objects  
  
 */
let myeditors = [];


function initSkeleton()
{
    radLoad();
    var mp = gE("mainscroll");
    var user = radVar("sess.user");
    let j = new MultiPaneTextEditor(mp);
    j.panes.id = "editpane";
    myeditors.push(j);

    var sb = buildStatusbar();
    mp.appendChild(sb);

    var loginarea = document.createElement("div");
    loginarea.id = "loginarea";
    mp.appendChild(loginarea);

    if( radVar("pagekey") != null ) {
        HtmlRequestGet('/vfs/start.js', '', gotStart);
    }
    radHook( "pagekey", pageUpdate );
    //radHook( "sess", pageUpdate );
    //j.clickAddPane();
    if( radVar("pagekey") != null ) pageUpdate();
}

function pageUpdate()
{
    console.log("pageUpdate");
    HtmlRequestGet('/vfs/start.js', '', gotStart);
}

function gotStart(data)
{
    console.log(data);
    var obj = JSON.parse(data);
    if( obj.status == 'ok' && obj.data.status == 'ok' ) {
        radStore("sess.user", obj.data.user);
        var panes = gE("editpane");
        var loginarea = gE("loginarea");
        panes.style.display = 'block';
        loginarea.style.display = 'none';
    } else {
        clickLogin();
        return;
    }
}

function clickLogin()
{
    var panes = gE("editpane");
    panes.style.display = 'none';
    var loginarea = gE("loginarea");
    loginarea.style.display = 'block';
    blitzTemplate(loginarea, "signin");
}

function buildStatusbar()
{
    var bar = document.createElement("div");
    bar.style.position = 'absolute';
    bar.style.bottom = "0px";
    bar.style.left = '0px';
    bar.style.width = '100%';
    bar.style.height = '36px';

    var btn = document.createElement("button");
    btn.style.position = 'absolute';
    btn.style.right = '0px';
    btn.style.top = '4px';

    //<btn xCmd='blitzTemplate(gE("mainscroll"), "signin")'>Login</btn>
    var user = radVar("sess.user");
    if( user == null ) {
        btn.innerHTML = "Login";
        btn.addEventListener("click", clickLogin);

        bar.appendChild(btn);
    }

    return bar;
}
registerStartup(initSkeleton)

</script>
