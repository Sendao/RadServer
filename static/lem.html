<style>
#yourtoast {
    visibility: hidden;
    min-width: 250px;
    background-color: #000;
    color: #ddd;
    text-align: center;
    border-radius: 2px;
    padding: 16px;
    position: absolute;
    z-index: 100;
    left: 50%;
    bottom: 30px;
    font-size: 17px;
    transform: translateX(-50%);
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
@keyframes fadeOut {
    from {opacity: 1;}
    to {opacity: 0;}
}
</style>
<script async src="https://spiritshare.org/js/es_shims.js"></script>

<script language=javascript>
function scriptPick(name)
{
  console.log("scriptPick(" + name + ")");
  const names = name.split('.');
  const ext = names.length > 1 ? names[names.length-1] : '';
  name = names[0];

  window.fetchIdent( name + (ext===''?'':'.') + ext, (nm) => {
      if( typeof nm != 'undefined' ) {
        if( ext === 'bin' ) {
          scriptPick(name + ".json");
        } else if( ext === "json" ) {
          alert("Couldn't load datafile - what a journey we have all had, yet never mind the missing earings, necklace, and watch -- you'll never be the same after you become one with the humane");
        } else {
          scriptPick(name + ".json");
        }
      }
    });
}
window.addEventListener('DOMContentLoaded', function(){
    console.log("Loaded");
    document.addEventListener('keydown', window.inKeys);
    scriptPick(typeof location.search == 'string' && location.search != '' ? location.search.substring(1) : 'first_visitor_saved');
});
</script>
