<script language=javascript>
let epsilon_prompter, epi_canvas=null, epi_context;
function getTextWidth(textarea, text, fontSize=null) {
  if( epi_canvas == null ) {
    epi_canvas = document.createElement('canvas');
    epi_canvas.style.overflow='hidden';
    epi_canvas.style.maxWidth=epi_canvas.style.maxHeight='1px';
    document.documentElement.appendChild(epi_canvas);
    epi_context = epi_canvas.getContext('2d');
  }
  let tgt_font = window.getComputedStyle(textarea).font;
  if( fontSize == null ) fontSize=window.getComputedStyle(textarea).fontSize;
  if( epi_context.font != tgt_font ) {
    epi_context.font = tgt_font;
  }
  if( epi_context.fontSize != fontSize ) {
    epi_context.fontSize = fontSize;
  }
  return epi_context.measureText(text).width;
}
function addEpsilon(div, target)
{
    var el = gE(target);
    el.addEventListener('onchange', chgEpsilon.bind(null,target));
    el.setAttribute('xOldFocus', 'focusEpsilon("' + target + '")');
    el.setAttribute('xOldBlur', 'blurEpsilon("' + target + '")');
    el.style.marginBottom = (50*5)+"px";
}
let epi_focus_kb=null;
function focusEpsilon(target)
{
    console.log("focusEpsilon(" +target+")");
    if( epi_focus_kb != null ) return;
    epi_focus_kb = registerKeyboard(chgEpsilon.bind(null,target));
}
function blurEpsilon(target)
{
    console.log("blurEpsilon(" + target + ")");
    kbfuncs.splice(epi_focus_kb,1);
    epi_focus_kb=null;
}

function chgEpsilonNew(div,target)
{
    if( typeof div.innerText != 'undefined' )
        chgEpsilon(target);
}
function chgEpsilon(target)
{
    var k;
    var el = gE(target);
    if( el == null ) {
        console.error("null target " + target);
        return;
    }
    var val;
    if( typeof el.innerText != 'undefined' ) val = el.innerText;
    if( ( typeof val == 'undefined' || val == "" ) && el.value != "" ) val = el.value;
    let w = event.key;
    if( typeof w != 'undefined' && letterType(w) <= 3 && w.length == 1 ) {
        val += w;
    }
    let phrases = toTokens(val);
//    console.log("chgEpsilon('" + val + "')");
    var word;
    var i, gen;
    var offset_width=0;
    var space_width = getTextWidth(el, " ");
    var parent_node = el.parentNode;
    for( i=0; i<parent_node.children.length; i++ ) {
        if( parent_node.children[i].id.startsWith(target +"_") ) {
            parent_node.removeChild(parent_node.children[i]);
            i--;
            continue;
        }
    }
    let left,top;
    [left,top] = getPosInside(el,document.documentElement);

    var joinwords = [], next_jw_widths = [], jwwidths = [];
    var wordseriesids = [];
    var widths = [], poslast = [], phraseslider = [];

    let joinword = "", jwwidth = 0;
    let spins=5, spin;

    for( i=0; i<spins; i++ ) {
        phraseslider.push([]);
        widths.push(0);
        poslast.push(0);
        next_jw_widths.push(0);
        jwwidths.push(0);
        joinwords.push('');
        wordseriesids.push('');
    }

    for( i=0; i<phrases.length; i++ ) {
        let t = phrases[i];

        if( typeof phrases[i] == 'undefined' || phrases[i] == 'undefined' || phrases[i] >= dict.length ) {
            console.log("Unknown phrase " + phrases[i]);
            continue;
        }
        let w = dict[t];
        joinword = joinWord(joinword, w);
        jwwidth = getTextWidth(el, joinword);
        let wwidth = getTextWidth(el, w);

        if( phraseslider[0].length < i+1 ) {
            for( spin=0; spin<spins; spin++ ) {
                phraseslider[spin].push(t);
                if( i == 0 )
                    poslast[spin] = wwidth;
            }
        }
        for( spin=0; spin<spins; spin++ ) {

            let alternates = nextwordn( phraseslider[spin].slice(i<6?0:i-6,i+1) );
            let alternates2 = nextwordn( phraseslider[spin].slice(i<6?0:i-6,i).concat( [t] ) );

            var qs = 0;
            for( k in alternates ) {
                if( dict[k] == ' ' ) continue;
                qs += alternates[k];
            }
            for( k in alternates2 ) {
                if( dict[k] == ' ' ) continue;
                qs += alternates2[k];
            }

            function generateDiv(k) {
                if( i == 0 ) {
                    wordseriesids[spin] = k;
                } else {
                    wordseriesids[spin] = wordseriesids[spin] + "_" + k;
                }
                joinwords[spin] = joinWord(joinwords[spin], dict[k]);
                //console.log(i, spin, joinwords[spin]);
                next_jw_widths[spin] = getTextWidth(el, joinwords[spin]);
                let width = getTextWidth(el, dict[k], '16pt');
                gen = document.createElement("div");
                gen.style.backgroundColor = 'white';
                gen.style.color = 'black';
                gen.id = target + "_" + wordseriesids[spin] + "_" + spin + "_" + k;
                gen.style.width = (width+4) + "px";
                gen.style.height = "33px";
                gen.style.position = 'absolute';
                gen.style.fontSize = "16pt";
                let leftadd = poslast[spin]+widths[spin];
                gen.style.left = ( left + leftadd ) + "px";
                gen.style.top = ( top + 35*(spin+1) ) + "px";
                gen.innerText = dict[k];
                gen.setAttribute('onclick', "switchEpsilon('" + target + "','" + wordseriesids[spin] + "'," + (i+1) + "," + k + ")");
                el.parentNode.appendChild(gen);
                widths[spin] = width+4;
                poslast[spin] = leftadd;
                if( i+1 >= phraseslider[spin].length )
                    phraseslider[spin].push(k);
                else
                    phraseslider[spin][i+1]=k;
            }

            let found=false;
            if( qs > 0 ) {
                var q = qRandom(0,qs);
                for( k in alternates ) {
                    if( dict[k] == ' ' ) continue;
                    q -= alternates[k];
                    if( q <= 0 ) {
                        found=true;
                        generateDiv(k);
                        break;
                    }
                }
                if( !found ) {
                    for( k in alternates2 ) {
                        if( dict[k] == ' ' ) continue;
                        q -= alternates2[k];
                        if( q <= 0 ) {
                            found=true;
                            generateDiv(k);
                            break;
                        }
                    }
                }
            }
            if( !found ) {
                generateDiv( xdict[nextof(nextwordn())] );
            }

            jwwidths[spin] = next_jw_widths[spin];
        }
    }
}
function switchEpsilon(target, wsid, i, a)
{
    var el = gE(target);
    var val;
    if( typeof el.innerText != 'undefined' ) val = el.innerText;
    if( ( typeof val == 'undefined' || val == "" ) && el.value != "" ) val = el.value;
    let phrases = toTokens(val);

    if( i >= phrases.length ) {
        phrases.push(a);
        if( typeof el.innerText != 'undefined' ) el.selectionStart = el.selectionEnd = el.innerText.length;
        else el.selectionStart = el.selectionEnd = el.value.length;
    } else {
        phrases[i]=a;
    }

    if( typeof el.value != 'undefined' && el.value != "" ) el.value = fromTokens(phrases);
    else el.innerText = fromTokens(phrases);

    chgEpsilon(target);
}
</script>
<script language=javascript>
var a,b, talking = false;

let nouns = null;


let voices = window.speechSynthesis.getVoices(), chosenVoice=0;

function chooseVoice() {
    voicefrm = document.forms['voices'];
    
    var chosen = voicefrm['voice'].value;
    chosenVoice = chosen;
    console.log("Chose voice " + voices[chosenVoice]);
}
function populateVoiceList(voiceSelect) {
    clearNode(voiceSelect);
    voices = window.speechSynthesis.getVoices();

    for (let i = 0; i < voices.length; i++) {
        if( !voices[i].localService ) continue;

        console.log(voices[i]);
        const option = document.createElement("option");
        option.textContent = `${voices[i].name} (${voices[i].lang})`;

        if (voices[i].default) {
            option.textContent += " — DEFAULT";
        }

        option.setAttribute("data-lang", voices[i].lang);
        option.setAttribute("data-name", voices[i].name);
        option.value = i;
        voiceSelect.appendChild(option);
    }
}



function animate()
{
    go();
}
function run()
{
    if( paused ) {
        resume();
    } else {
        pause();
    }
}

let last_speech = 0;
function go(cmd)
{
    let now = new Date().getTime();
    if( now < last_speech+1000 ) return;
    last_speech=now;
    if( talking && ( window.speechSynthesis.pending || window.speechSynthesis.speaking ) ) return;

    txt = document.forms['epsilon'].txt.value;
    if( typeof cmd != 'undefined' ) {
        txt = cmd + " " + txt;
    }
    [a,f] = gen(txt, document.forms['epsilon'].flavor.value, document.forms['epsilon'].changing.checked);
    document.getElementById('genarea').innerText = a;
    saveGen(a);
    b = a.split(' ').slice(-6);
    document.forms['epsilon'].txt.value = b.join(" ");
    saveText();
    document.forms['epsilon'].flavor.value = f;
    saveFlavor();

    if( talking ) {
        let utter = new SpeechSynthesisUtterance(a);
        utter.voice = voices[ chosenVoice ];
        //utter.pitch = 1.0;
        utter.rate = 1.0;
        window.speechSynthesis.speak(utter);
    }
}

function epsilonTalk()
{
    talking = !talking;
    if( talking ) {
        resume();
    } else {
        pause();
    }
}
function saveGen(msg)
{
    window.localStorage['gen'] = msg;
}
function saveText()
{
    window.localStorage['text'] = document.forms.epsilon.txt.value;
}
function saveFlavor()
{
    window.localStorage['flavor'] = document.forms.epsilon.flavor.value;
}
function epOnLoad() {
    var e = gE("mainscroll");
    blitzTemplate(e, "epsilon");
}
function epOnLoad2() {
    if( 'flavor' in window.localStorage ) {
        document.forms['epsilon'].flavor.value = window.localStorage['flavor'];
    }

    if( 'gen' in window.localStorage ) {
        document.getElementById('genarea').innerText = window.localStorage['gen'];
    } else if( 'text' in window.localStorage ) {
        document.forms['epsilon'].txt.value = window.localStorage['text'];
        go( document.forms['epsilon'].txt.value );
    } else {
        go( document.forms['epsilon'].txt.value );
    }
}
</script>

<script language=javascript>
let augkeys = "";
let augiters = 20;
let usemodel2 = false;
var basicMenu;
let config = null;

function initSkeleton()
{
    basicMenu = [
        { title: 'Search', 'open':1, 'children': [
            { title: '[new]', act: "newSearch()" },
            ] },
        { title: 'Setup', act: "setup()" },
        { title: '(WordPainter)', act: "painter()" },
        { title: '-> Chat <-', act: "epOnLoad()" },
        ];

    radLoad();

    let default_nouns = ['street', 'intersection', 'decide', 'right', 'left', 'feet', 'destination', 'situations', 'people', 'zombie', 'gaze', 'code', 'beginning', 'circumstances', 'distractions', 'yourself', 'climax', 'lovers', 'life', 'lives', 'blow', 'face', 'framing', 'spacing', 'clarity', 'mind', 'shape', 'explosion', 'fire', 'progress', 'universe', 'frames', 'expansion', 'part', 'future', 'baby', 'testing', 'someone', 'zone', 'tv', 'cofactors', 'rides', 'codes'];

    if( 'obs' in localStorage ) {
        try {
            config = JSON.parse(localStorage['obs']);
            if( typeof config.prompt != 'object' ) config.prompt = {};
            if( typeof config.nouns != 'object' || !Array.isArray(config.nouns) ) config.nouns = default_nouns;
        } catch( e ) {
            config = {prompt:{},nouns:default_nouns};
        }
    } else {
        config = {
            prompt: {},
            nouns: default_nouns
        };
    }
    nouns = config.nouns;
    radStore("prompt", config.prompt);
    buildMenu();

    blitzTemplate(gE("mainscroll"), "setup");
    
    speechSynthesis.onvoiceschanged = radLoad;
}

function saveConfig()
{
    let prompt = radVar("prompt");
    if( '0' in prompt ) delete prompt['0'];
    localStorage['obs'] = JSON.stringify({prompt,nouns});
}

function painter()
{
    templateParams();
    blitzTemplate(gE("mainscroll"), "wordpainter");
}
function drawPainterWords(div)
{
    clearNode(div);
    var html = "";
    for( var w of dict ) {
        if( nouns.indexOf(w) >= 0 ) {
            html += "<div class=fl style='color: blue; font-size: 18pt' onClick='pNoun(\"" + w + "\")'>" + w + "</div>";
        } else {
            html += "<div class=fl style='font-size: 18pt' onClick='pNoun(\"" + w + "\")'>" + w + "</div>";
        }
        html += "<div class=fl>&nbsp;</div>"
    }
    div.innerHTML = html;
}
function pNoun(word)
{
    let pos = nouns.indexOf(word);
    if( pos < 0 )
        nouns.push(word); // add word
    else
        nouns.splice(pos,1); // remove word
    config.nouns = nouns;
    saveConfig();
    // redraw words
    drawPainterWords(gE("painterwords"));
}
function renderWordLists()
{
    console.log("nouns",nouns);
    let others = [];
    for( var w of dict ) {
        if( nouns.indexOf(w) < 0 && others.indexOf(w) < 0 ) {
            others.push(w);
        }
    }
    console.log("others",others);
}

function toggleDiv(eid)
{
    var e = gE(eid);
    if( !e ) return;
    if( e.style.display == "none" ) {
        e.style.display = "block";
    } else {
        e.style.display = "none";
    }
}

function getMenu(menu, label)
{
    for( var a=0; a<menu.length; a++ ) {
        if( menu[a].title == label ) return menu[a];
    }
    return menu;
}

function buildMenu(overlay)
{
    if( typeof overlay != 'object' ) overlay = {};
    if( !('Search' in overlay) ) {
        let prompts = radVar("prompt");
        if( prompts === null ) prompts = {};
        let children = [];
        for( var i in prompts ) {
            children.push({title: prompts[i].prompt.substring(0,24), act: 'editPrompt("' + i + '")'});
        }
        children.push({ title: '[new]', act: "newSearch()"});
        overlay.Search = { children };
    }

    let menu = cloneObject2(basicMenu);
    var menu_a, menu_b;

    for( var a in overlay ) {
        menu_a = getMenu(menu, a);
        for( var b in overlay[a] ) {
            menu_a[b] = overlay[a][b];
        }
    }

    structMenu(menu);
}

{
    let prompts = radVar("prompt");
    prompts['0'] = {id:0,prompt:""};
    radStore("prompts.0", prompts['0']);
    templateParams({selectedprompt:0});
    blitzTemplate(gE("mainscroll"), "promptnew");
}

function editprompt(frm)
{
    let prompt = frm.prompt.value;
    id = frm.id.value;
    let prompts = radVar("prompt");
    prompts[id].prompt = prompt;
    saveConfig();
}
function gotAddPrompt(prompt)
{
    var prompts = radVar("prompt");
    let id = findId('prompt');
    prompts[id] = {prompt, id};
    saveConfig();

    buildMenu();
}

function editPrompt(id)
{
    radStore("prompts." + id, radVar("prompt." + id));
    radStore("selectedprompt", id);
    blitzTemplate(gE("mainscroll"), "prompt");
}
function getPromptNum( id )
{
    var prompt = radVar("prompt");
    var i;
    for( i in prompts ) {
        if( prompt[i].id == id ) return i;
    }
    return -1;
}



function findId( basis )
{
    var newid;
    while(true) {
        newid = Math.floor(Math.random()*10000);
        if( radVar(basis + "." + newid) == null ) return newid;
    }
}

function setup()
{
    blitzTemplate(gE("mainscroll"), "setup");
}



function hideMe(e)
{
    console.log("hideMe",e);
    e.style.display='none';
}
function hidePrev(e)
{
    console.log("hideMe",e.previousSibling);
    e.previousSibling.style.display='none';
}
registerStartup(initSkeleton);

</script>
</html>
