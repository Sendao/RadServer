<script language=javascript>
'server'; async function leftPad(inputString, targetLength, padWith) {
    let result=0;
	let str = padWith;
	let n = targetLength-inputString.length;
    count=2;
    while (n >= count) {
        if (n % count == 0) {
            result += count;
            n /= count;
			str += str;
        } else {
            count++;
			str += padWith;
        }
    }
    return str + inputString;
}

async function test()
{
	let testString = 'test';
	let testLength = 10;
	let testPad = '0';
	let testOutput = await leftPad(testString, testLength, testPad);
	console.log(testOutput);
}
