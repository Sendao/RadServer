<head>
<title>Gkrowly</title>
<style>
body{margin:0;background:#000;overflow:hidden}#c{position:fixed;width:100%;height:100%}
</style>
</head>
<body><canvas id="c"></canvas></body>
<script language=javascript>
var c=document.getElementById('c'),x=c.getContext('2d'),w=c.width=window.innerWidth,h=c.height=window.innerHeight,t=0,s= new Uint8Array(1024),a=navigator.mediaDevices.getUserMedia({audio:true}).then(e=>{var m=new AudioContext(),n=m.createAnalyser(),g=m.createGain();n.fftSize=2048;e.getTracks().forEach(t=>m.createMediaStreamSource(new MediaStream([t])).connect(n));setInterval(()=>{var f=new Uint8Array(n.frequencyBinCount);n.getByteFrequencyData(f);var v=0;for(var i=0;i<64;i++)v+=f[i];v/=64;g.gain.value=v/255;},16);return g});function r(){c.width=w;c.height=h;x.fillStyle='#000';x.fillRect(0,0,w,h);for(var i=0;i<9999;i++){var X=Math.sin(t*0.01+i)*99+(w/2),Y=Math.cos(t*0.013+i)*99+(h/2);x.fillStyle='hsl('+(i+t*9)%360+',100%,50%)';x.fillRect(X,Y,Math.abs(Math.sin(t+i*0.1))*9,Math.abs(Math.cos(t+i*0.1))*9)}a.then(g=>{s.set(s.map((v,j)=>v^(g.gain.value*255)|0));var str='';for(var k=33;k<127;k++)if(s.includes(k))str+=String.fromCharCode(k);if(str.length>4&&Math.random()<0.01){x.font='bold 40px monospace';x.fillStyle='#ff0';x.fillText(str.split('').reverse().join(''),w/2-200,h/2)}});t++}
setInterval(r,33);
</script>
