isDigit = function(a)
{
  return( a == '0' || a == '1' || a == '2' || a == '3' ||
    a == '4' || a == '5' || a == '6' || a == '7' ||
    a == '8' || a == '9' );
}

tokenize = function( text )
{
  var i, len;
  var answers = [];
  var words = [];
  var fairsyms = ['_', '@', '%', '$', '-', '+', '=', "'", ',', ';', ':', '!'];
  var wordbuf="", c;
  len = text.length;
  for( i = 0; i < len; ++i ) {
      c = text[i];
      if( isAlpha(c) || isDigit(c) || c in fairsyms ) {
          wordbuf += c;
      } else {
          if( wordbuf.length > 0 ) {
              words.push(wordbuf);
          }
          if( c != ' ' )
            words.push(c);
          wordbuf="";
      }
      if( words.length > 998 ) {
        answers.push(words);
        words=[];
      }
  }
  if( wordbuf.length > 0 ) {
      words.push(wordbuf);
  }
  answers.push(words);
  return answers;
};


let max_words_in_phrase = 6;
var nexts = {};

formatMarky = function( text )
{
  if( typeof text != 'string' ) text = text.join(" ");
  var words = tokenize( text );
  nexts = {};
  var l = null;
  var i, c, n;
  for( n=0; n<words.length; n++ ) {
    let len = words[n].length;
    for( i = 0; i < len; ++i ) {
      c = words[n][i];
      if( i+1 >= len ) {
        if( words.length >= n+1 )break;
        l = words[n+1][0];
      } else {
        l = words[n][i+1];
      }

      if( !(c in nexts) )        nexts[c] = {};
      if( !(l in nexts) )        nexts[l] = {};
      if( !(l in nexts[c]) )     nexts[c][l] = 0;

      ++nexts[c][l];
    }
  }

  console.log(nexts);

  return nexts;
};

let phr = new Set();
var phrases = [];
buildPhrase = function(next,w,c=1)
{
  if( Object.keys(next[w]).length != 1 || phr.has(w) || c >= max_words_in_phrase ) return w;
  phr.add(w); // tag you're it
  for( var x in next[w] ) {
    if( phr.has(x) ) return w;
    return w + " " + buildPhrase(next,x,c+1);
  }
}
extractRays = function(next)
{
  let phrase = "";
  phr = new Set();
  for( var w in next ) {
    if( phr.has(w) ) continue;
    phrases.push( Object.keys(next[w]).length == 1 ? buildPhrase(next,w) : w );
  }
  return phrases;
}
analyzeRays = function(phrases)

    }
    sentiments[phrases[i].toLowerCase()] = [sentiment/words.length,0,0];
    commonality[phrases[i].toLowerCase()] = commonality/words.length;
  }
}

let alphaSentiment = function(word) {
  var i;
  var vowels = ['e','a','i','o','u','y','h','s','w'];
  let consonants = ['b','c','d','f','g','j','k','l','m','n','p','q','r','t','v','x','z'];
  let alphaScores = {
    a: 2, b: 3, c: 3, d: -4, e: 3, f: 0, g: 0, h: 5, i: 3, j: 0, k: 1, l: 5, m: -6, n: 3, o: 7, p: 8, q: 9, r: 2, 
    s: -4, t: -3, u: -6, v: -4, w: 8, x: -3, y: -2, z: -5,
    0: 0, 1: 3, 2: 2, 3: 6, 4: -3, 5: 3, 6: -1, 7: -8, 8: 4, 9: 5
  };
  var score=0;
  var wl = word.toLowerCase();
  for( i = 0; i < word.length; i++ ) {
    if( !(wl[i] in alphaScores) ) {
      score++;
      continue;
    }
    score += alphaScores[wl[i]];
  }
  if( score == 0 || word.length == 0 /*?*/ /*who knows, these days..*/ ) return 0;
  score/=word.length;
//  console.log(word,score);
  return score;
}

let prepareWord = function(word ) {
  let wl = word.toLowerCase();

  let words = word.split(" ");
  if( words.length > 1 ) {
    for( var w of words ) {
      if( !(w in graph) ) continue;
      prepareWord(w);
    }
  }

  graph[word].length = word.length;
  graph[word].commonality = wl in commons ? commons[wl] : ((word.length)*100);

  if( wl in sentiments ) {
    graph[word].sentiment = sentiments[wl][0] + sentiments[wl][1] - sentiments[wl][2];
  } else {
    graph[word].sentiment = (Math.random()*0.5+0.25) * alphaSentiment(word);
  }
  graph[word].heat = graph[word].sentiment/30 + graph[word].commonality/1000 + Math.random()*0.5;

  let total_weight=0;
  for( var w=0; w<graph[word].connections.length; w+=2 ) {
    let nw = graph[word].connections[w];
    if( !(nw in graph) ) {
      continue;
      added_keys.push(nw);
      graph[nw] = { connections: [ ], length: nw.length, sentiment: 0.0, commonality: 0.0, definitionClarity: 0.5, binarySum: 0, extraDimensions: [] };
    }
    total_weight += Math.abs(graph[word].connections[w+1]) * graph[word].sentiment; // let's do it that way
    //if( graph[nw].connections.indexOf(word) == -1 )
    //  addCon(nw,word,graph[word].connections[w+1]);
  }
  graph[word].definitionClarity = total_weight;
};

let centerOffset={};

let buildText = function(word) {
  let geo = new TextGeometry( word, {
        font: font,
        size: font_size*vis_scaling,
        height: font_size/8*vis_scaling,
        depth: 0.01*vis_scaling,
        bevelSize: 0.1,
        bevelThickness: 0.2,
        bevelEnabled: false
      } );

  geo.computeBoundingBox();
  centerOffset[word] = - 0.5 * ( geo.boundingBox.max.x - geo.boundingBox.min.x );

  let c1 = new THREE.Color( .4+heat_factor*graph[word].heat, 0.4, 0.4 );
  let c2 = new THREE.Color( .4+heat_factor*graph[word].heat, 0.4, 0.4 );

  let materials = [
          new THREE.MeshPhongMaterial( { color: c1 } ), // front
          new THREE.MeshPhongMaterial( { color: c2 } ) // side
        ];
  let obj = new THREE.Mesh( geo, materials );
  objects[obj] = word;
  obj.name = word;
  return obj;
}

  var i, j, sum=0;
  var d, max_dist=2*max_coord_end;
  var len, d;
  len = Math.max(e0.length,e1.length) + 3;

  for( i=0; i<len; i++ ) {
    let a = (i==len-3?x0:(i==len-2?y0:(i==len-1?z0:(i>=e0.length?0:e0[i]))));
    let b = (i==len-3?x1:(i==len-2?y1:(i==len-1?z1:(i>=e1.length?0:e1[i]))));
    d = Math.min( max_dist, Math.abs( a - b ) );
    sum += d;//d*d;

function dist(w0,w1) {

  let z1 = nodes[w1][2] + nodes[w1][11];

  x0 /= w0.length/6;
  x1 /= w1.length/6;

  var i, j, sum=0;

  len = Math.max(e0.length,e1.length) + 3;

  for( i=0; i<len; i++ ) {
    let a = (i==len-3?x0:(i==len-2?y0:(i==len-1?z0:(i>=e0.length?0:e0[i]))));
    let b = (i==len-3?x1:(i==len-2?y1:(i==len-1?z1:(i>=e1.length?0:e1[i]))));
    d1 = Math.min( max_dist, Math.abs( a - b ) );

    j=i+1;

    let e = (j==len-3?x0:(j==len-2?y0:(j==len-1?z0:(j>=e0.length?0:e0[j]))));
    let f = (j==len-3?x1:(j==len-2?y1:(j==len-1?z1:(j>=e1.length?0:e1[j]))));
    d2 = Math.min( max_dist, Math.abs( e - f ) );
    // d2 /= w1.length/5;
    
    if( d2 > d1 ) {
      let swap = d1;
      d1 = d2;
      d2 = swap;
    }

    if( d1-d2 <= 0.25*d1 ) { // 10,8 => 100+64 => 164 => 12
      sum -= Math.sqrt(d1); // 10 => 3.16

const springForce = (k, target_distance, a, b) => {

  if( distance > target_distance ) distance = Math.max(0, target_distance-(distance-target_distance)); // maximimum = target_distance
  distance = target_distance - distance; // will end up at 0 - target_distance
  distance = distance / target_distance; // now at 0 - 1.
  let dir = new THREE.Vector3( (nb[0]+nb[9]) - (na[0]+na[9]), (nb[1]+nb[10]) - (na[1]+na[10]), (nb[2]+nb[11]) - (na[2]+na[11]) );

  return dir.multiplyScalar(k*0.8 + k*0.2*distance);
};

function isLetter(c) {
  let x = c.charCodeAt(0);
  let a = 'a'.charCodeAt(0), A = 'A'.charCodeAt(0), z = 'z'.charCodeAt(0), Z = 'Z'.charCodeAt(0);
  let v0 = '0'.charCodeAt(0), v9 = '9'.charCodeAt(0);

  return ( ( x >= a && x <= z ) || ( x >= A && x <= Z ) || ( x >= v0 && x <= v9 ) );
}

function anaLyze(words=null) {
  var i;
  let lastwords=[], max_reps=0;

  if( words !== null ) {

    for( i=0; i<drift_config.length; i++ ) {
      drift_allowance[i] = drift_config[i] * words.length/drift_words;
    }

    graph = {};
    /*
    for( var word in words ) {
      if( !(word in graph) ) continue;
      let w2s = word.split(' ');
      if( w2s.length != 1 ) {
        for( var word2 of w2s ) {
          graph[word2].connections = [];
          graph[word2].reps = 0;
          graph[word2].isNew = false;
        }
      }
      graph[word].connections = [];
      graph[word].reps = 0;
      graph[word].isNew = false;
    }
    */
    sim_map.links = null;
    for( i=0; i<words.length; i++ ) {
      let wl = words[i].split(' ');
      if( wl.length != 1 )
        wl.push( words[i] ); // prepare the whole word as well

      for( var word of wl ) {
        var node, counter;
        if( typeof word != 'string' ) continue;
        if( word.length < min_word_length ) continue;
        if( !(word in graph) ) {
          graph[word] = { isNew: true, reps: 1, connections: [], length: 0, definitionClarity: 0.5, binarySum: 0, extraDimensions: [] };
          let wl = word.toLowerCase();
          graph[word].commonality = wl in commons ? commons[wl] : (word.length*100);
          if( wl in sentiments ) {
            graph[word].sentiment = sentiments[wl][0] + sentiments[wl][1] - sentiments[wl][2];
          } else {
            graph[word].sentiment = (Math.random()*0.5+0.25) * alphaSentiment(word);
          }
        } else {
          if( !('commonality' in graph[word]) ) {
            graph[word].commonality = wl in commons ? commons[wl] : (word.length*100);
          }
          if( !('sentiment' in graph[word]) ) {
            if( wl in sentiments ) {
              graph[word].sentiment = sentiments[wl][0] + sentiments[wl][1] - sentiments[wl][2];
            } else {
              graph[word].sentiment = (Math.random()*0.5+0.25) * alphaSentiment(word);
            }
          }
          graph[word].reps++;
        }
      }
      max_reps = Math.max(max_reps, graph[word].reps);
      sim_map.add_word( word );
    }

    for( var word in nodes ) {
      if( !(word in graph) || (graph[word].reps==0) ) {
        delete nodes[word];
        if( word in graph ) delete graph[word];
      }
    }

    sim_map.calculateSize(); // automatically calls update() to refresh the map
  } else {
    let lst = Object.keys(graph);
    for( i=0; i<lst.length; i++ ) {
      sim_map.add_word(lst[i]);
    }
  }

  let lst = Object.keys(graph);
  let sum = 0;
  for( i=0; i<lst.length; i++ ) {
    let word = lst[i];
    if( graph[word].reps == 0 ) {
      delete graph[word];
      continue;
    }

    graph[word].connections = sim_map.con_word(word);
    graph[word].wordcount = word.split(' ').length;
    sum += graph[word].connections.length;
  }
    
  lst = Object.keys(graph).map( (x) => ( [graph[x].wordcount+(0/*graph[x].reps*/)+graph[x].connections.length/sum,x] ));
  lst.sort( (a,b) => b[0]-a[0] );

  var xx = max_words;
  do {
    if( xx >= lst.length ) break;
    delete graph[ lst[xx][1] ];
  } while( xx++ );

  gr_keys = Object.keys(graph).length;

  for( var word in graph ) {
    for( var c=0; c<graph[word].connections.length; c+=2 ) {
      if( !(graph[word].connections[c] in graph) ) {
        graph[word].connections.splice(c,2);
        c-=2;
      }
    }
  }
}

function addAngel(e)
{
  let mx = e.clientX/window.innerWidth, my = 1.0-e.clientY/window.innerHeight;
  console.log("mx: ", mx, "my: ", my);

  if( sorted_sentiment === null ) {
    sorted_sentiment=[[],[]];
    for( var k in sentiments ) {
      sorted_sentiment[0].push([sentiments[k][0]-sentiments[k][1],k]);
//      sorted_sentiment[1].push([sentiments[k][1],k]);
    }
    sorted_sentiment[0].sort((a,b)=>(a[0]-b[0]));
//    sorted_sentiment[1].sort((a,b)=>(a[0]-b[0]));
  }

  // mx for commonality, my for sentiment
  var sent = sorted_sentiment[0];

  var topsent = sent[ sent.length-1 ][0];
  var botsent = sent[ 0 ][0];

  var tgtsent = my * ( topsent - botsent ) + botsent;

  var t,b;
  b=0;
  t=sent.length-1;

  let range = 50; // todo: reverse the calculation so we use commons first, then sentimentality

  while( b+range<t) {
    var y = b + Math.floor( (t-b)/2 );

    if( t == b ) {
    } else if( sent[y][0] > tgtsent ) {
      t = y;
    } else if( sent[y][0] < tgtsent ) {
      b = y+1;
    }
  }

  let comms = [];
  for( var i=b; i<sent.length && i<=t; i++ ) {
    if( savebuffer.indexOf( sent[i][1] ) >= 0 ) {
      t++;
      continue;
    }
    comms.push( [ sent[i][1], commons[ sent[i][1] ] ] );
  }
  if( comms.length < 0 ) {
    alert("Word list is empty, sorry!");
    return;
  }
  comms.sort((a,b)=>(a[1]-b[1])); // least common words first
  var l,r;
  l=0;
  r=comms.length-1;
  var topcomm = comms[ comms.length-1 ][1];
  var botcomm = comms[ 0 ][1];

  var tgtcomm = my * ( topcomm - botcomm ) + botcomm;
  while( l<r ) {
    var x = l + Math.floor( (r-l)/2 );

    if( r == l ) {
    } else if( comms[x][1] < tgtcomm ) {
      l = x+1;
    } else if( comms[x][1] > tgtcomm ) {
      r = x;
    }
  }

  console.log("Add word: ", comms[l][0], sentiments[comms[l][0]], commons[comms[l][0]]);

  let buf = savebuffer + " " + comms[l][0];
  zoom_shift = (buf.length / savebuffer.length);
  savebuffer = buf;
  rebuildSystem();
}
