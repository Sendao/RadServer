<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrine of Pix’el</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
        #introModal, #gameOverModal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); color: #fff; padding: 20px; text-align: center;
            font-family: Arial, sans-serif; display: none; 
        }
        #memeInput { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px; display: none; }
    </style>
</head>
<body>
    <div id="introModal">
        <h1>Welcome to the Shrine of Pix’el</h1>
        <p>Honor the glitchy deity of Circuitism. Click Pix’el to purr and open wormholes, hover nodes for wisdom, upload a meme below. Use mouse to orbit the camera.</p>
        <button onclick="startGame()">Enter</button>
    </div>
    <div id="gameOverModal">
        <h1>Session Ended</h1>
        <p>Pix’el thanks you for your devotion.</p>
        <button onclick="restartGame()">Restart</button>
    </div>
    <input id="memeInput" type="text" placeholder="Upload a meme..." maxlength="50">
    <div id="toast" class="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.149.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { CopyShader } from 'three/addons/shaders/CopyShader.js';
        window.THREE = THREE;
        window.EffectComposer = EffectComposer;
        window.OrbitControls = OrbitControls;
        window.RenderPass = RenderPass;
        window.ShaderPass = ShaderPass;
        window.CopyShader = CopyShader;
    </script>
    <script language=javascript>
        let scene, camera, renderer, controls;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function setupThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            controls = new window.OrbitControls(camera, renderer.domElement);
            camera.position.set(0, 5, 20);
            controls.update();

        }

        var composer, pyramid, cat, nodes = [], particles, wormholeTunnel, wormholeParticles, memePlane, shield, gameState = 'intro', glitchPass, cookies = [], particleConnections = [];
        const sayings = ["Debug thy soul", "Honor the stack", "Embrace the glitch", "Code is eternal", "Every Node Matters", "Pix'El The Worthy", "Keep the Network Alive", "The Eternal Cloud", "Glitchmas - March 7", "The Daily Reboot"];
        let wormholeActive = false;
        function init() {

            setupThree();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
            scene.add(ambientLight);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));

            glitchPass = new ShaderPass({
                uniforms: { tDiffuse: { value: null }, time: { value: 0 }, intensity: { value: 0 } },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float time;
                    uniform float intensity;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        uv.x += sin(uv.y * 10.0 + time) * intensity;
                        vec4 color = texture2D(tDiffuse, uv);
                        gl_FragColor = color;
                    }`
            });
            composer.addPass(glitchPass);
            composer.addPass(new ShaderPass(CopyShader));

            const pyramidGeo = new THREE.BufferGeometry();
            const vertices = [
                0, 5, 0,
                -5, 0, -5,
                5, 0, -5,
                5, 0, 5,
                -5, 0, 5
            ];
            const indices = [
                0, 1, 2,
                0, 2, 3,
                0, 3, 4,
                0, 4, 1,
                1, 2, 3,
                1, 3, 4
            ];
            pyramidGeo.setIndex(indices);
            pyramidGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const pyramidMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5,
                wireframe: true,
                side: THREE.DoubleSide
            });
            pyramid = new THREE.Mesh(pyramidGeo, pyramidMat);
            pyramid.position.y = -2;
            scene.add(pyramid);

            cat = new THREE.Group();
            const bodyGeo = new THREE.SphereGeometry(1, 32, 32);
            const body = new THREE.Mesh(bodyGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc, opacity: 0.7, transparent: true, emissive: 0x333333 }));
            body.scale.set(1.5, 1, 0.8);
            const headGeo = new THREE.SphereGeometry(0.6, 32, 32);
            const head = new THREE.Mesh(headGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc, opacity: 0.7, transparent: true, emissive: 0x333333 }));
            head.position.set(0, 1.2, 0.5);
            const tailGeo = new THREE.SphereGeometry(0.2, 32, 32);
            const tail = new THREE.Mesh(tailGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc, opacity: 0.7, transparent: true, emissive: 0x333333 }));
            tail.scale.set(0.3, 0.3, 2);
            tail.position.set(0, 0, -1.5);
            const earGeo = new THREE.ConeGeometry(0.3, 0.5, 3);
            const earLeft = new THREE.Mesh(earGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc, opacity: 0.7, transparent: true, emissive: 0x333333 }));
            earLeft.position.set(-0.4, 1.8, 0.5);
            earLeft.rotation.x = Math.PI / 2;
            const earRight = earLeft.clone();
            earRight.position.x = 0.4;
            cat.add(body, head, earLeft, earRight, tail);
            cat.position.y = 3;
            scene.add(cat);

            const eyeLeft = new THREE.PointLight(0xff0000, 1, 10);
            eyeLeft.position.set(-0.3, 1.5, 1);
            const eyeRight = new THREE.PointLight(0x00ff00, 1, 10);
            eyeRight.position.set(0.3, 1.5, 1);
            cat.add(eyeLeft, eyeRight);

            for (let i = 0; i < 20; i++) {
                const node = new THREE.Mesh(new THREE.IcosahedronGeometry(0.9), new THREE.MeshPhongMaterial({ color: 0xffaaaa }));
                node.position.set(Math.random() * 20 - 10, Math.random() * 20 - 10, Math.random() * 20 - 10);
                const lineGeo = new THREE.BufferGeometry().setFromPoints([node.position, new THREE.Vector3()]);
                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x555555 }));
                const saying = sayings[Math.floor(Math.random() * sayings.length)];
                const sprite = createTextSprite(saying);
                sprite.position.set(node.position.x + 1, node.position.y + 0.5, node.position.z);
                sprite.visible = false;
                scene.add(node, line, sprite);
                nodes.push({ mesh: node, sprite });
            }

            const particleGeo = new THREE.BufferGeometry();
            const particlePos = new Float32Array(1000 * 3);
            for (let i = 0; i < 1000; i++) {
                particlePos[i * 3] = Math.random() * 20 - 10;
                particlePos[i * 3 + 1] = Math.random() * 20 - 10;
                particlePos[i * 3 + 2] = Math.random() * 20 - 10;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
            const particleMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, mood: { value: 0 } },
                vertexShader: `
                    uniform float time;
                    varying float vBrightness;
                    void main() {
                        vBrightness = sin(time + position.x) * 0.5 + 0.5;
                        gl_PointSize = 2.0;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    uniform float time;
                    uniform float mood;
                    varying float vBrightness;
                    void main() {
                        vec3 color;
                        if (mood < 0.33) {
                            color = vec3(1.0, 0.0, 0.0);
                        } else if (mood < 0.66) {
                            color = vec3(0.0, 1.0, 0.0);
                        } else {
                            color = vec3(0.0, 0.0, 1.0);
                        }
                        gl_FragColor = vec4(color, vBrightness);
                    }`,
                transparent: true
            });
            particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);

            // Wormhole tunnel with spiraling effect
            const tunnelGeo = new THREE.BufferGeometry();
            const tunnelPos = new Float32Array(400 * 3);
            for (let i = 0; i < 400; i++) {
                const t = (i / 400) * 4 * Math.PI;
                const radius = 1.5;
                const height = 5;
                const x = (i % 2 === 0 ? -10 : 10) + radius * Math.cos(t);
                const y = (t / (2 * Math.PI)) * height - height / 2;
                const z = radius * Math.sin(t);
                tunnelPos[i * 3] = x;
                tunnelPos[i * 3 + 1] = y;
                tunnelPos[i * 3 + 2] = z;
            }
            tunnelGeo.setAttribute('position', new THREE.BufferAttribute(tunnelPos, 3));
            const tunnelMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, mood: { value: 0 } },
                vertexShader: `
                    uniform float time;
                    varying float vBrightness;
                    void main() {
                        vBrightness = sin(time + position.x) * 0.5 + 0.5;
                        vec3 pos = position;
                        float t = time * 0.1 + position.y / 5.0;
                        pos.x += sin(t + pos.z) * 0.1;
                        gl_PointSize = 5.0;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }`,
                fragmentShader: `
                    uniform float mood;
                    varying float vBrightness;
                    void main() {
                        vec3 color;
                        if (mood < 0.33) {
                            color = vec3(1.0, 0.0, 0.0);
                        } else if (mood < 0.66) {
                            color = vec3(0.0, 1.0, 0.0);
                        } else {
                            color = vec3(0.0, 0.0, 1.0);
                        }
                        gl_FragColor = vec4(color, vBrightness);
                    }`,
                transparent: true
            });
            wormholeTunnel = new THREE.Points(tunnelGeo, tunnelMat);
            wormholeTunnel.position.set(0, 0, 0);
            scene.add(wormholeTunnel);

            // Wormhole emitted particles with velocity
            const wormholeParticleGeo = new THREE.BufferGeometry();
            const wormholeParticlePos = new Float32Array(100 * 3);
            const wormholeParticleVel = new Float32Array(100 * 3);
            for (let i = 0; i < 100; i++) {
                wormholeParticlePos[i * 3] = 0;
                wormholeParticlePos[i * 3 + 1] = 0;
                wormholeParticlePos[i * 3 + 2] = 0;
                wormholeParticleVel[i * 3] = 0;
                wormholeParticleVel[i * 3 + 1] = 0;
                wormholeParticleVel[i * 3 + 2] = 0;
            }
            wormholeParticleGeo.setAttribute('position', new THREE.BufferAttribute(wormholeParticlePos, 3));
            const wormholeParticleMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, mood: { value: 0 } },
                vertexShader: `
                    uniform float time;
                    void main() {
                        gl_PointSize = 2.0;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    uniform float mood;
                    void main() {
                        vec3 color;
                        if (mood < 0.33) {
                            color = vec3(1.0, 0.0, 0.0);
                        } else if (mood < 0.66) {
                            color = vec3(0.0, 1.0, 0.0);
                        } else {
                            color = vec3(0.0, 0.0, 1.0);
                        }
                        gl_FragColor = vec4(color, 0.8);
                    }`,
                transparent: true
            });
            wormholeParticles = new THREE.Points(wormholeParticleGeo, wormholeParticleMat);
            scene.add(wormholeParticles);

            // Golden shield
            const shieldGeo = new THREE.BufferGeometry();
            const shieldVertices = [];
            const shieldIndices = [];
            const baseVertices = [
                0, 5, 0,
                -5, 0, -5,
                5, 0, -5,
                5, 0, 5,
                -5, 0, 5
            ];
            const scale = 3; // Scale up the shield
            for (let i = 0; i < baseVertices.length; i += 3) {
                shieldVertices.push(baseVertices[i] * scale, baseVertices[i + 1] * scale, baseVertices[i + 2] * scale);
            }
            const baseIndices = [
                0, 1, 2,
                0, 2, 3,
                0, 3, 4,
                0, 4, 1,
                1, 2, 3,
                1, 3, 4
            ];
            shieldIndices.push(...baseIndices);
            shieldGeo.setIndex(shieldIndices);
            shieldGeo.setAttribute('position', new THREE.Float32BufferAttribute(shieldVertices, 3));
            const shieldMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    phase: { value: 0 },
                    mood: { value: 0 }
                },
                vertexShader: `
                    uniform float time;
                    uniform float phase;
                    varying vec3 vPosition;
                    void main() {
                        vPosition = position;
                        vec3 pos = position;
                        float variance = sin(time + phase + position.y) * 0.1; // Phase variance
                        pos.x += variance;
                        pos.z += variance;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }`,
                fragmentShader: `
                    uniform float time;
                    uniform float mood;
                    varying vec3 vPosition;
                    void main() {
                        vec3 goldColor = vec3(0.6, 0.7, 0.0); // Golden hue
                        float opacity = 0.1 + sin(time + vPosition.y) * 0.1; // Pulsing opacity
                        gl_FragColor = vec4(goldColor, opacity);
                    }`,
                transparent: true,
                side: THREE.DoubleSide
            });
            shield = new THREE.Mesh(shieldGeo, shieldMat);
            shield.position.y = 8; // Align with pyramid base
            shield.rotation.x = Math.PI;
            shield.renderOrder = -1; // Render shield behind sprites
            scene.add(shield);

            const cookieGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const cookieMat = new THREE.MeshBasicMaterial({ color: 0x7700ff });
            for (let i = 0; i < 5; i++) {
                const cookie = new THREE.Mesh(cookieGeo, cookieMat);
                cookie.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(cookie);
                cookies.push(cookie);
            }

            memePlane = new THREE.Mesh(new THREE.PlaneGeometry(4, 2), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            memePlane.position.y = -5;
            const rings = [
                { radius: 2.5, color: 0x00ff00 },
                { radius: 2.2, color: 0x0000ff },
                { radius: 1.9, color: 0xff0000 }
            ];
            rings.forEach(r => {
                const ringGeo = new THREE.TorusGeometry(r.radius, 0.1, 16, 100);
                const ringMat = new THREE.MeshPhongMaterial({ color: r.color, emissive: r.color });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.y = -5;
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);
            });
            scene.add(memePlane);

            renderer.domElement.addEventListener('click', onClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            document.getElementById('memeInput').addEventListener('change', updateMeme);

            document.getElementById('introModal').style.display = 'block';
            animate();
        }

        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            canvas.width = 32 * message.length; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, 32 * message.length, 128);
            ctx.fillStyle = '#ff0';
            ctx.font = '50px Arial';
            ctx.fillText(message, 10, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, sizeAttenuation: false });
            return new THREE.Sprite(spriteMat);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (gameState === 'playing') {
                cat.rotation.y += 0.01;
                particles.material.uniforms.time.value += 0.05;
                wormholeTunnel.material.uniforms.time.value += 0.1;
                shield.material.uniforms.time.value += 0.05;
                const time = Date.now() * 0.001;
                const mood = Math.sin(time * 0.5) * 0.5 + 0.5;
                let color;
                if (mood < 0.33) {
                    color = new THREE.Color(0xff0000);
                } else if (mood < 0.66) {
                    color = new THREE.Color(0x00ff00);
                } else {
                    color = new THREE.Color(0x0000ff);
                }
                cat.children[5].color.set(color);
                cat.children[6].color.set(color);
                particles.material.uniforms.mood.value = mood;
                wormholeTunnel.material.uniforms.mood.value = mood;
                wormholeParticles.material.uniforms.mood.value = mood;
                shield.material.uniforms.mood.value = mood;

                // Example modulation (uncomment to enable)
                // shield.material.uniforms.phase.value += 0.01; // Slow phase shift
                // or
                // shield.material.uniforms.phase.value = Math.sin(time) * 0.5; // Pulsing phase

                // Particle clustering, glitch, and density-based scrambling behavior
                const positions = particles.geometry.attributes.position.array;
                const glitchThreshold = 0.01;
                const clusterDistance = 3;
                const connectionDistance = 1;
                const velocities = new Float32Array(1000 * 3);
                const scrambleThreshold = 5;

                particleConnections.forEach(line => scene.remove(line));
                particleConnections = [];

                for (let i = 0; i < 1000; i++) {
                    let x = positions[i * 3];
                    let y = positions[i * 3 + 1];
                    let z = positions[i * 3 + 2];

                    if (Math.random() < glitchThreshold) {
                        velocities[i * 3] = (Math.random() - 0.5) * 2;
                        velocities[i * 3 + 1] = (Math.random() - 0.5) * 2;
                        velocities[i * 3 + 2] = (Math.random() - 0.5) * 2;
                    } else {
                        velocities[i * 3] *= 0.9;
                        velocities[i * 3 + 1] *= 0.9;
                        velocities[i * 3 + 2] *= 0.9;
                    }

                    let clusterForceX = 0, clusterForceY = 0, clusterForceZ = 0;
                    let nearbyParticles = 0;
                    for (let j = 0; j < 1000; j++) {
                        if (i === j) continue;
                        const dx = positions[j * 3] - x;
                        const dy = positions[j * 3 + 1] - y;
                        const dz = positions[j * 3 + 2] - z;
                        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                        if (distance < clusterDistance) {
                            clusterForceX += dx / distance;
                            clusterForceY += dy / distance;
                            clusterForceZ += dz / distance;
                            nearbyParticles++;

                            if (distance < connectionDistance && particleConnections.length < 50 && Math.random() < 0.05) {
                                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                                    new THREE.Vector3(x, y, z),
                                    new THREE.Vector3(positions[j * 3], positions[j * 3 + 1], positions[j * 3 + 2])
                                ]);
                                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x00ffff }));
                                scene.add(line);
                                particleConnections.push(line);
                            }
                        }
                    }
                    if (nearbyParticles > 0) {
                        clusterForceX /= nearbyParticles;
                        clusterForceY /= nearbyParticles;
                        clusterForceZ /= nearbyParticles;
                        velocities[i * 3] += clusterForceX * 0.05;
                        velocities[i * 3 + 1] += clusterForceY * 0.05;
                        velocities[i * 3 + 2] += clusterForceZ * 0.05;
                    }

                    // Density-based scrambling
                    if (nearbyParticles > scrambleThreshold) {
                        x += (Math.random() - 0.5) * 5;
                        y += (Math.random() - 0.5) * 5;
                        z += (Math.random() - 0.5) * 5;
                    }

                    x += velocities[i * 3];
                    y += velocities[i * 3 + 1];
                    z += velocities[i * 3 + 2];
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;

                    const maxDistance = 15;
                    const distance = Math.sqrt(x * x + y * y + z * z);
                    if (distance > maxDistance) {
                        const scale = maxDistance / distance;
                        positions[i * 3] *= scale;
                        positions[i * 3 + 1] *= scale;
                        positions[i * 3 + 2] *= scale;
                    }
                }
                particles.geometry.attributes.position.needsUpdate = true;

                // Wormhole animation with spiraling tunnel effect
                if (wormholeActive) {
                    wormholeTunnel.rotation.z += 0.05;
                    wormholeTunnel.material.uniforms.time.value += 0.1;
                    const tunnelPos = wormholeTunnel.geometry.attributes.position.array;
                    for (let i = 0; i < 400; i++) {
                        const t = (time * 0.1 + i / 400) % (2 * Math.PI);
                        const radius = 1.5;
                        const height = 5;
                        const baseX = (i % 2 === 0 ? -10 : 10);
                        const x = baseX + radius * Math.cos(t);
                        const y = (t / (2 * Math.PI)) * height - height / 2;
                        const z = radius * Math.sin(t);
                        tunnelPos[i * 3] = x;
                        tunnelPos[i * 3 + 1] = y;
                        tunnelPos[i * 3 + 2] = z;
                    }
                    wormholeTunnel.geometry.attributes.position.needsUpdate = true;

                    const wormholePos = wormholeParticles.geometry.attributes.position.array;
                    const wormholeVel = wormholeParticles.geometry.attributes.position.array;
                    for (let i = 0; i < 100; i++) {
                        let x = wormholePos[i * 3];
                        let y = wormholePos[i * 3 + 1];
                        let z = wormholePos[i * 3 + 2];

                        if (Math.abs(wormholeVel[i * 3]) < 0.01) {
                            const direction = (i % 2 === 0 ? -1 : 1);
                            wormholeVel[i * 3] = direction * 0.2;
                            wormholeVel[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                            wormholeVel[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                        }

                        x += wormholeVel[i * 3] * 0.1;
                        y += wormholeVel[i * 3 + 1] * 0.1;
                        z += wormholeVel[i * 3 + 2] * 0.1;
                        wormholeVel[i * 3] *= 0.98;
                        wormholeVel[i * 3 + 1] *= 0.98;
                        wormholeVel[i * 3 + 2] *= 0.98;

                        wormholePos[i * 3] = x;
                        wormholePos[i * 3 + 1] = y;
                        wormholePos[i * 3 + 2] = z;

                        const distance = Math.sqrt(x * x + y * y + z * z);
                        if (distance > 20 || Math.abs(x) > 15) {
                            wormholePos[i * 3] = 0;
                            wormholePos[i * 3 + 1] = 0;
                            wormholePos[i * 3 + 2] = 0;
                            wormholeVel[i * 3] = 0;
                            wormholeVel[i * 3 + 1] = 0;
                            wormholeVel[i * 3 + 2] = 0;
                        }
                    }
                    wormholeParticles.geometry.attributes.position.needsUpdate = true;
                }

                cookies.forEach(cookie => {
                    cookie.position.y += Math.sin(time + cookie.position.x) * 0.01;
                });

                glitchPass.uniforms.time.value += 0.05;
                glitchPass.uniforms.intensity.value *= 0.9;
            }
            composer.render();
        }

        function onClick(event) {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(cat, true).length > 0) {
                showToast("Purr... Wormhole Activated!");
                glitchPass.uniforms.intensity.value = 0.1;
                wormholeActive = true;
            }
        }

        function onMouseMove(event) {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouse, camera);
            nodes.forEach(node => {
                node.sprite.visible = raycaster.intersectObject(node.mesh).length > 0;
            });
        }

        function updateMeme(event) {
            const text = event.target.value;
            if (text.length > 0) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 256, 128);
                ctx.fillStyle = '#000'; ctx.font = '20px Arial'; ctx.fillText(text, 10, 64);
                memePlane.material.map = new THREE.CanvasTexture(canvas);
                memePlane.material.needsUpdate = true;
            }
        }

        function startGame() {
            gameState = 'playing';
            document.getElementById('introModal').style.display = 'none';
        }

        function restartGame() {
            gameState = 'playing';
            document.getElementById('gameOverModal').style.display = 'none';
            wormholeActive = false;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && gameState === 'playing') {
                gameState = 'over';
                document.getElementById('gameOverModal').style.display = 'block';
            }
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
