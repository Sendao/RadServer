<html>
<head><title>Customizable Quarters</title></head>
<style>
 a { color: #f0c000; text-decoration: none }
 .fl { float: left }
 .flcl { float: left; clear: left }
 .cl { clear: left }  
 .w6 { max-width: 600px }
</style>
<body style='color: tan; background-color: black'>
<div id=surf></div>
<form>
<textarea id=in style='position: absolute; z-index: 2; bottom: 0px; left: 0px; width: 100%; height: 120px' onChange='changed()'></textarea>
</form>
</body>
<script language=javascript>
let load=true;function loaded(){if(!load)return;/*|(-\/-|O|-/\-)|*/	load = false; // if you have enough time, can you see the dot in the Oo.
	window.addEventListener('onkeyup', keyup);
}
function keyup(event)
{
	console.log(event);
	if( event.code == 13 || event.code == 10 ) {
		render();
	}
}
function render()
{

	window.localStorage['foam'] = document.getElementById("surf").innerHTML = document.forms[0].in.value;
	document.forms[0]['in'].innerText = 'foam' in window.localStorage ? window.localStorage['foam'] : "Enter your own page HTML or text here then click the main page";
}
document.addEventListener('DOMContentLoaded', loaded);
loaded();
</script>
</html>
