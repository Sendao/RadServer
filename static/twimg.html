<script language=javascript>

function initSkeleton()
{
	radClass( { 'zenbox': { 'style': 'display: none', 'keepscan': 1 } } );
//	structStartup();    
//  radStartup();
    radLoad();
    registerResize(resizeScreen);
    HtmlRequestGet('/twimg/start.js', '', gotStart);
}

function resizeScreen() {
  var max_width = 1980, max_font = 18;
  var min_width = 800, min_font = 10;
  var w = window.innerWidth;
  if( document.body.style.fontFamily == 'Courier New' || document.body.style.fontFamily == 'Verdana' ) {
    max_font = 16;
    min_font = 8;
  }
  var x = (w-min_width)/(max_width-min_width);
  var rng_font = (max_font-min_font)*x + min_font;

  document.body.style.fontSize = rng_font + "pt";
}

registerStartup(initSkeleton)

</script>
