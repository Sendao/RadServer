<html>
<body>
<script src="/js/sentiments.js"></script>
<script language=javascript>
var a,b,voices;
let chosenVoice=0;
let config = {};
let length_set = false;
let default_config = {
 'text': "Welcome to Epsilon.",
 'length': '200',
 'changing': true,
 'speaking': false
};
function saveConfig(reread=true)
{
  if( reread ) {
    config.text = document.forms[0].txt.value;
    config.flavor = document.forms[0].flavor.value;
    config.speaking = document.forms[0].spokenword.checked;
    config.changing = document.forms[0].changing.checked;
    config.gen = document.getElementById('genarea').innerText;
  }

  window.localStorage['cfg'] = JSON.stringify(config);
}
function loadConfig()
{
  if( 'cfg' in window.localStorage ) {
    config = JSON.parse(window.localStorage['cfg']);
  } else {
    config = default_config;
  }

	if( 'flavor' in config )
	  document.forms[0].flavor.value = config.flavor;
	if( 'text' in config )
	  document.forms[0].txt.value = config.text;
  if( 'speaking' in config )
	  document.forms[0].spokenword.checked = config.speaking;
  if( 'changing' in config )
    document.forms[0].changing.checked = config.changing;

	if( 'gen' in config ) {
		document.getElementById('genarea').innerText = config.gen;
	} else if( 'text' in config ) {
    go( config.text );
  } else {
		go( "Epsilon online, reporting a new visitor to interstice Text Alpha 9" );
	}

}
function run()
{
	if( !Array.isArray(b) )
		b = [ 'hello,', 'world!' ];
	let txt = b.join(" ");
	go(txt);
	setTimeout(run,20000);
}
function findZira()
{	
	for (let i = 0; i < voices.length; i++) {
		if( !voices[i].localService ) continue;
		if( voices[i].name.indexOf("Zira") != -1 ) {
			chosenVoice = i;
			break;
		}
	}
}
function reset()
{
  config = default_config;
  saveConfig(false);
  loadConfig();
}
function go(txt)
{
  let words = txt.split(" ");
  if( words[0][0] == "-" ) {
    let n = parseInt(words[0]) * -1;
    if( !isNaN(n) ) {
      config.length = n;
    }
  }
    
	document.forms[0].txt.value = txt;

  if( !length_set && 'length' in config ) {
    txt = "-" + config.length + " " + txt;
    length_set = true;
  }
 	[a,f] = gen(txt, document.forms[0].flavor.value, document.forms[0].changing.checked);

  config.flavor = f;
  config.gen = a;

	b = a.split(' ').slice(-6);
  config.text = b.join(" ");

  saveConfig(false);
  loadConfig();

  if( config.speaking ) {
    let utter = new SpeechSynthesisUtterance(a);
    utter.voice = voices[ chosenVoice ];
    utter.rate = 1.0;
    window.speechSynthesis.speak(utter);
  }
}
</script>

<script src='js/qrandom.js'></script>
<script language=javascript>
var rNums = [];
var rC = 0, rndMax=2000;
let cC = 0;
let myseed = "stay";

function qRandom() {
  if (rNums.length < rndMax) {
    startRandoms();
  }
  rC++;
  if (rC >= rNums.length) rC -= rNums.length;
  cC += Math.floor(rNums[rC] * 50);
  while (cC >= rNums.length) cC -= rNums.length;
  let x = (rNums[rC] * 0.1 + rNums[cC] * 0.9);

  return x;
}

function startRandoms() {
  myseed = Math.random(); // initial random seed
  while (rNums.length < rndMax) {
    rNums.push(myseed * Math.random());
  }
}
</script>

<script language=javascript>
window.onload = function() {
  loadConfig();

}
let registered=false;
document.getElementById('spokenword').addEventListener('change', ()=>{
	voices = window.speechSynthesis.getVoices();
	if( voices.length != 0 ) {
		findZira();
	} else if( !registered ) {
		registered=true;
		speechSynthesis.addEventListener('voiceschanged', () => {
    	voices = window.speechSynthesis.getVoices();
    	findZira();
		});
	}
});
</script>
