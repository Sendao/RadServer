    "imports": {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
window.THREE = THREE;
window.OrbitControls = OrbitControls;

<script language=javascript>

let font = null;

let instances = null;
let texts = {};
var gravTimeout=100;
var gravTimer=-1;
var running=false;
var paused=false;
let cycles=0, min_cycles=100;
let sizing = 5.0, opacity = 1.0, scaling = 100.0;
let vis_scaling = 100.0;
let maxtime = 50;
let force_scale = 1, grav_scale = 0.004, vel_scale = 0.01, max_acc = 1, max_vel = 4, acc_scale = 0.01;
let border_force = 0.01;
let max_dist_start = 1500, max_dist_end = 2000;

function pause() {
  paused=!paused;
}
function animdone() {
  requestAnimationFrame(animdone);
  if( running ) return;

  var tx = new Date();
  var td = tx - runningtime;

  if( td > maxtime )
    gravTimeout=0;
  else if( gravTimeout < td*2 || gravTimeout < 100 ) { // using too much cpu.
    gravTimeout += td/3;
  } else if( gravTimeout > td*2 ) { // going too slowly.
    gravTimeout -= td/3;
  }
  if( gravTimer !== -1 )
    clearTimeout(gravTimer);
  gravTimer = setTimeout( "animate()", gravTimeout );
}
let rendering=false;
function render() {
  if(rendering)return;
  rendering=true;
  updateThree();
  renderer.render( scene, camera );
  rendering=false;
}
let runningtime=null;
function animate() {
  if( running )
    return;

  if( paused ) {
    animdone();
    return;
  }

  running = true;
  runningtime = new Date();

  //registerRadPost(animdone);
  let timescale = 1;

  updatePositions();
  if( cycles < min_cycles ) {
    cycles++;
    if( cycles%20 == 0 ) console.log(cycles + "/" + min_cycles);
  } else {
    render();
  }

  if( gravTimeout > 5000 )
    console.log("gt="+gravTimeout);

  running=false;
  animdone();
}


let graph = { // sample: (this data is not used)
  'silly': {
    connections: ['ridiculous', 0.85, 'serious', -0.7, 'important', 0],
    position: [0,0,0],
    length: 0,
    sentiment: 0, // Placeholder value, should be computed
    commonality: 0, // Placeholder value, should be computed
    definitionClarity: 0.5, // Placeholder value, should be computed
    binarySum: 448, // Placeholder value, should be computed
    extraDimensions: [] // To store additional dimensions dynamically
  },
  'silly': { connections: ['ridiculous', 0.85, 'serious', -0.7, 'important', 0], length: 5, sentiment: 0.2, commonality: 0.3, definitionClarity: 0.5, binarySum: 448, extraDimensions: [] },
  'happy': { connections: ['joyful', 0.9, 'sad', -0.8, 'content', 0.5], length: 5, sentiment: 0.9, commonality: 0.6, definitionClarity: 0.7, binarySum: 520, extraDimensions: [] },
  'angry': { connections: ['furious', 0.8, 'calm', -0.9, 'irritated', 0.6], length: 5, sentiment: -0.8, commonality: 0.4, definitionClarity: 0.6, binarySum: 645, extraDimensions: [] },
  'fast': { connections: ['quick', 0.9, 'slow', -0.8, 'speedy', 0.7], length: 4, sentiment: 0.4, commonality: 0.5, definitionClarity: 0.8, binarySum: 410, extraDimensions: [] },
  'smart': { connections: ['intelligent', 0.85, 'stupid', -0.8, 'clever', 0.6], length: 5, sentiment: 0.6, commonality: 0.4, definitionClarity: 0.7, binarySum: 555, extraDimensions: [] }
};


var scene=null, renderer, controls, camera;

function threeCanvas()
{
  if( scene !== null ) return;

  scene = new THREE.Scene();
  scene.background = new THREE.Color( 0x000000 );
  renderer = new THREE.WebGLRenderer({
      antialias: true
      //alpha: true
  });
  renderer.setPixelRatio( window.devicePixelRatio );  
  renderer.setSize( window.innerWidth, window.innerHeight );
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1*vis_scaling, 100000*vis_scaling);

  renderer.domElement.style.padding = renderer.domElement.style.margin = "0px";
  document.body.appendChild( renderer.domElement );
  // LIGHTS

  const dirLight = new THREE.DirectionalLight( 0xffffff, 0.4 );
  dirLight.position.set( 0, 0, 1 );
  //dirLight.position.normalize();
  scene.add( dirLight );

  const pointLight = new THREE.PointLight( 0xffffff, 4.5, 0, 0 );
  pointLight.color.setHSL( Math.random(), 1, 0.5 );
  pointLight.position.set( 0, 100, 90 );
  scene.add( pointLight );

  var light3 = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(light3);
  
  controls = new OrbitControls( camera, renderer.domElement );

  let mywidth = window.innerWidth, myheight = window.innerHeight;
  let mydepth = (mywidth+myheight)/2;

  camera.position.set( 0.1 * max_dist_end * 0.5 * vis_scaling, 0.02 * max_dist_end * 0.5 * vis_scaling, max_dist_end * 0.5 * vis_scaling );
  camera.lookAt(new THREE.Vector3() );
  controls.target = new THREE.Vector3();
  controls.update();
}

let nodes = {}, origin = {};
let edges = [];
let nodelist = [];

// Prepare graph
let addCon = function(word1,word2,weight) { // from word1 to word2 with weight
  graph[word1].connections.push(word2,weight);
}
let added_keys = [];
let validWord = word => ( ( word in commons ) && ( word in sentiments ) );

let prepareWord = function(word ) {
  if( !validWord(word) ) {
    delete graph[word];
    return;
  }
  graph[word].length = word.length;
  graph[word].commonality = commons[word];
  graph[word].sentiment = sentiments[word][0] + sentiments[word][1] - sentiments[word][2];

  let total_weight=0;
  for( var w=0; w<graph[word].connections.length; w+=2 ) {
    let nw = graph[word].connections[w];
    if( !validWord(nw) ) {
      console.log("Invalid word link " + word + "->" + nw);
      graph[word].connections.splice(w,2);
      w -= 2;
      continue;
    }
    total_weight += Math.abs(graph[word].connections[w+1]);
    if( nw in graph ) {
      if( graph[nw].connections.indexOf(word) == -1 )
        addCon(nw,word,graph[word].connections[w+1]);
      continue;
    }
    added_keys.push(nw);
    graph[nw] = { connections: [ ], length: nw.length, sentiment: 0.0, commonality: 0.0, definitionClarity: 0.5, binarySum: 0, extraDimensions: [] };
    addCon(nw,word,graph[word].connections[w+1]);
  }
  graph[word].definitionClarity = total_weight;
};


function setup() {

  let graph_keys = Object.keys(graph);
  graph_keys.forEach(prepareWord);
  added_keys.forEach(prepareWord);

  if( instances != null )
      scene.remove(instances);

  geometry = new THREE.BoxGeometry( sizing*vis_scaling, sizing*vis_scaling, sizing*vis_scaling );
  material = new THREE.MeshLambertMaterial( {color: 0x00e3e3 } );
  material.opacity = opacity;
  material.transparent = false;

  nodes={};
  console.log("Drawing graph: " + Object.keys(graph).length + " words.");
  nodelist=[];
  Object.keys(graph).forEach(word => {
    graph[word].ident = nodelist.length;
    nodelist.push(word);
    nodes[word] = [ Math.random() * scaling, Math.random() * scaling, Math.random() * scaling, 0,0,0, 0,0,0 ];
    origin[word] = [0,0,0,0,0,0,0,0,0];
  });

  instances = new THREE.InstancedMesh( geometry, material, nodelist.length );
  instances.instanceMatrix.setUsage( THREE.DynamicDrawUsage ); // will be updated every frame
  scene.add(instances);

  Object.keys(graph).forEach(word => {
    let node = nodes[word];
    instances.setMatrixAt( graph[word].ident, new THREE.Matrix4().makeTranslation( node[0]*vis_scaling, node[1]*vis_scaling, node[2]*vis_scaling ) );
    instances.setColorAt( graph[word].ident, new THREE.Color( .5,.5,.5 ) );
    nodelist.push(word);
    let geo = new TextGeometry( word, {
          font: font,
          size: 10*vis_scaling,
          height: 1*vis_scaling,
          depth: 0.01*vis_scaling,
          bevelSize: 0.1,
          bevelThickness: 0.2,
          bevelEnabled: false
        } );

    geo.computeBoundingBox();
    let centerOffset = - 0.5 * ( geo.boundingBox.max.x - geo.boundingBox.min.x );
    let materials = [
            new THREE.MeshPhongMaterial( { color: 0xa000ff } ), // front
            new THREE.MeshPhongMaterial( { color: 0x00a0ff } ) // side
          ];
    let tMesh = new THREE.Mesh( geo, materials );

    tMesh.position.x = (node[0] + centerOffset)*vis_scaling;
    tMesh.position.y = (node[1] + 10)*vis_scaling;
    tMesh.position.z = (node[2])*vis_scaling;

    tMesh.rotation.x = 0;
    //tMesh.rotation.y = Math.PI * 2;
    scene.add( tMesh );      
    texts[word] = tMesh;
  });
  instances.instanceColor.needsUpdate = true;
  instances.instanceMatrix.needsUpdate = true;

// Create edges

  console.log("Drawing edges");
  Object.keys(graph).forEach(word => {
    for (let i = 0; i < graph[word].connections.length; i += 2) {
      const connectedWord = graph[word].connections[i];
      const weight = graph[word].connections[i + 1];
      const start = nodes[word];
      const end = nodes[connectedWord];

      const material = new THREE.LineBasicMaterial({ color: weight > 0 ? 0x0000ff : 0xff0000 });
      const points = [];
      points.push(new THREE.Vector3(start[0], start[1], start[2]));
      points.push(new THREE.Vector3(end[0], end[1], end[2]));
      let geometry = new THREE.BufferGeometry().setFromPoints(points);
      let line = new THREE.Line(geometry, material);
      scene.add(line);
      edges.push({ line, weight, start: word, end: connectedWord });
    }
  });  

  animdone();
}


let last_time = null, last_tick = null;
let totalSpeed = 0;
let lengths = {};

let forcemap = {
  data: null,
  fmsize: 20,
  fmfact: 0.01,
  count: 0,
  //mapped: new Map(),

  coord: function(n) {
    /*if( !this.mapped.has(n) )
      this.mapped.set(n, Math.min( this.fmsize-1, Math.max( 0, Math.abs(parseInt(n*this.fmfact)) ) ));
    return this.mapped.get(n);*/
    return Math.min( this.fmsize-1, Math.max( 0, Math.abs(parseInt(n*this.fmfact)) ) );
  },

  getforce: function(word){
    if( this.data === null ) {
      return new THREE.Vector3();
    }
    let x = nodes[word][0], y = nodes[word][1], z = nodes[word][2];
    let fmx = this.coord(x), fmy = this.coord(y), fmz = this.coord(z);

    let result = new THREE.Vector3();
    let inside_envelope = 10.0, outside_envelope = 30.0;
    let target_space = 5.0;

    inside_envelope *= inside_envelope;
    outside_envelope *= outside_envelope;
    target_space *= target_space;
    var v1 = new THREE.Vector3( x, y, z );
    var x0,y0,z0,x1,y1,z1;
    x0 = (fmx<=1)?0:fmx-1;
    y0 = (fmy<=1)?0:fmy-1;
    z0 = (fmz<=1)?0:fmz-1;
    x1 = (fmx>=this.fmsize-1)?this.fmsize-1:fmx+1;
    y1 = (fmy>=this.fmsize-1)?this.fmsize-1:fmy+1;
    z1 = (fmz>=this.fmsize-1)?this.fmsize-1:fmz+1;

    let match_count=0;
    for( var X = x0; X<=x1; X++ ) {
      for( var Y = y0; Y<=y1; Y++ ) {
        for( var Z = z0; Z<=z1; Z++ ) {
          let lst = this.data[X][Y][Z];
          for( var i=0; i<lst.length; i++ ) {
            let w2 = lst[i].word;
            if( w2 == word ) continue;
            if( !(w2 in nodes) ) {
              console.log("Missing word: " + w2);
              continue;
            }
            let node = nodes[w2];
            var v2 = new THREE.Vector3( node[0], node[1], node[2] );
            let d = dist( node[0],node[1],node[2],x,y,z,graph[w2].extraDimensions,graph[word].extraDimensions );
            var x2;

            if( d >= outside_envelope ) continue;
            x2 = ( d < inside_envelope ) ? (target_space - d) : (d-inside_envelope); // that was dumb I shouldn't have onelined that, sorry scott nobody else edits though anyway :(

            if(  isNaN(x2) || Math.abs(x2) > outside_envelope ) {
              console.log("yy ", v, x2, d, inside_envelope, target_space);
            }
            let x1 = x2;
            let s = x2>0?1:-1;
            x2 = Math.abs(x2);

            let v = v2.sub(v1);
            if( isNaN(v.x) || isNaN(v.y) || isNaN(v.z) || isNaN(x2) ) {
              console.log("yy ", v, x2, x1);
            }
            v.normalize();

            result.x += v.x*Math.log(x2)*s;
            result.y += v.y*Math.log(x2)*s;
            result.z += v.z*Math.log(x2)*s;
            match_count++;
            if( match_count > 30 ) break;
          }
          if( match_count > 30 ) break;
        }
        if( match_count > 30 ) break;
      }
      if( match_count > 30 ) break;
    }
    if( match_count == 0 ) return result; // spoiler alert: it's zero

    let r2 = result.multiplyScalar( match_count/3 ); // we should try representing ourselves more faithfully, it might hold the key to maintaining our integrity.
    if( isNaN(r2.x) || isNaN(r2.y) || isNaN(r2.z) ) {
      console.log("r2", r2, result, match_count);
    }
    return r2;
  },
  move: function(word,tox,toy,toz){
    if( this.data === null ) {
      this.data=new Array(this.fmsize).fill(null);
      for( var i=0; i<this.fmsize; i++ ) {
        this.data[i] = new Array(this.fmsize).fill(null);
        for( var j=0; j<this.fmsize; j++ ) {
          this.data[i][j] = new Array(this.fmsize).fill(null);
          for( var k=0; k<this.fmsize; k++ ) {
            this.data[i][j][k] = [];
          }
        }
      }
    }

    let fmx = this.coord(tox), fmy = this.coord(toy), fmz = this.coord(toz);
    let olx = this.coord( origin[word][0] ), oly = this.coord( origin[word][1] ), olz = this.coord( origin[word][2] );

    if( olx != fmx || oly != fmy || olz != fmz ) {
      var lst = this.data[olx][oly][olz];
      var item = false;
      for( var i=0; i<lst.length; i++ ) {
        if( lst[i].word == word ) {
          item = lst[i];
          lst.splice(i,1);
          break;
        }
      }
      if( item === false ) {
        item = { word: word, strength: 1 };
        this.count++;
      }
      if( isNaN(fmx) || isNaN(fmy) || isNaN(fmz) ) {
        console.log("oh shit");
      }
      this.data[fmx][fmy][fmz].push(item);
    }

    let node = nodes[word];
    instances.setMatrixAt( graph[word].ident, new THREE.Matrix4().makeTranslation( tox*vis_scaling, toy*vis_scaling, toz*vis_scaling ) );
    if( !(word in texts) || isNaN(tox) || isNaN(toy) || isNaN(toz) ) {
      console.log("wtf word should be in texts: ", word, tox, toy, toz);
      throw "error";
    }
    texts[word].position.x = tox*vis_scaling;
    texts[word].position.y = (toy + 10)*vis_scaling;
    texts[word].position.z = toz*vis_scaling;
  }
};


const addDimension = (node) => {
  const newDimensionValue = Math.random() * 10 - 5;
  graph[node].extraDimensions.push(newDimensionValue);
};

/*
    const k = 0.1 * Math.abs(weight); // Adjust the spring constant based on the weight
    const length = 10 * (1 - Math.abs(weight)); // Shorter length for higher weights
*/
function dist(x0,y0,z0,x1,y1,z1,extra0,extra1){
  var i, sum=0;
  var d, max_dist=30, max_d2 = 60;

  d = Math.abs( x1 - x0 );
  sum += (d>max_dist)?max_d2:(d+d);

  d = Math.abs( y1 - y0 );
  sum += (d>max_dist)?max_d2:(d+d);

  d = Math.abs( z1 - z0 );
  sum += (d>max_dist)?max_d2:(d+d);

  let len0=extra0.length, len1=extra1.length;
  for( i=0;i<len0;i++){
    if( i < len1 ) {
      d = Math.abs( extra1[i] - extra0[i] );
    } else {
      d = Math.abs( extra0[i] );
    }
    sum += (d>max_dist)?max_d2:(d+d);
  }
  for( ;i<len1;i++ ) {
    d = Math.abs( extra1[i] );
    sum += (d>max_dist)?max_d2:(d+d);
  }

  return sum;
}

const projectTo3D = (node) => {
  const extraDimensions = graph[node].extraDimensions;
  if (extraDimensions.length > 0) {
    const scale = 0.1; // Scale factor for projection
    const projection = extraDimensions.reduce((acc, val) => acc + val, 0) * scale;
    nodes[node][2] += projection; // add to z value
  }
};

const springForce = (k, length, a, b) => {
  let na = nodes[a], nb = nodes[b];
  let distance = dist(na[0],na[1],na[2],nb[0],nb[1],nb[2],graph[a].extraDimensions,graph[b].extraDimensions) - length*length;
  let dir = new THREE.Vector3( nb[0] - na[0], nb[1] - na[1], nb[2] - na[2] );
  dir.normalize();
  return dir.multiplyScalar(k * distance);
};

function updatePositions()
{
  let time_now = new Date().getTime();
  if( last_time == null ) {
    last_tick = last_time = time_now;
    return;
  }
  let td = ( time_now - last_time ) / 1000.0;
  
  totalSpeed = 0;

  if( td > 0.04 ) {
    Object.keys(graph).forEach(word => {
      origin[word][3] = nodes[word][3];
      origin[word][4] = nodes[word][4];
      origin[word][5] = nodes[word][5];
      if( isNaN(nodes[word][3]) || isNaN(nodes[word][4]) || isNaN(nodes[word][5]) ) {
        console.log("yxy ", grav);
      }

      let grav = forcemap.getforce(word);
      if( isNaN(grav.x) || isNaN(grav.y) || isNaN(grav.z) || Math.abs(grav.x) > 100 || Math.abs(grav.y) > 100 || Math.abs(grav.z) > 100 ) {
        //console.log("ybvy ", grav);
        //throw "Error";
      }
      nodes[word][3] = grav.x*grav_scale;
      nodes[word][4] = grav.y*grav_scale;
      nodes[word][5] = grav.z*grav_scale;
    });
    edges.forEach(edge => {
      const { line, weight, start, end } = edge;
      const startPosition = nodes[start];
      const endPosition = nodes[end];
      const k = 100 * Math.abs(weight); // Adjust the spring constant based on the weight
      const length = 5 * (1 - Math.abs(weight)); // Shorter length for higher weights
      const force = springForce(k, length, start, end);

      // Update velocities with force
      startPosition[3] += force.x;
      startPosition[4] += force.y;
      startPosition[5] += force.z;

      endPosition[3] -= force.x;
      endPosition[4] -= force.y;
      endPosition[5] -= force.z;
    });
    Object.keys(graph).forEach(word => {
      lengths[word] = nodes[word][3]+nodes[word][4]+nodes[word][5];
      totalSpeed += lengths[word];
    });
    let max_border = max_dist_end - max_dist_start;
    let scaler = max_dist_start*0.1 + max_dist_end*0.9;
    Object.keys(graph).forEach(word => {
      let node = nodes[word];
      let totaldist = Math.sqrt( node[0]*node[0] + node[1]*node[1] + node[2]*node[2] );
      if( totaldist > max_dist_end ) {
        let remap = new THREE.Vector3( node[0], node[1], node[2] );
        remap.normalize();
        node[0] = remap.x*scaler;
        node[1] = remap.y*scaler;
        node[2] = remap.z*scaler;
        node[3] = node[4] = node[5] = 0;
      } else if( totaldist > max_dist_start ) {
        var pow = ( -(totaldist-max_dist_start) / max_border ) *border_force;
        let pos = new THREE.Vector3( node[0], node[1], node[2] );
        pos.normalize();

        node[3] += pow*(pos.x);
        node[4] += pow*(pos.y);
        node[5] += pow*(pos.z);

        if( isNaN(node[3]) || isNaN(node[4]) || isNaN(node[5]) || Math.abs(node[3]) > 100*max_acc || Math.abs(node[4]) > 100*max_acc || Math.abs(node[5]) > 100*max_acc ) {
          //console.log("hh shit2", node, pow, pos, totaldist);
        }
      }

      node[3] = (0.5*origin[word][3] + 0.5*node[3]);
      if( node[3] < -max_acc ) node[3] = -max_acc;
      if( node[3] > max_acc ) node[3] = max_acc;
      node[4] = (0.5*origin[word][4] + 0.5*node[4]);
      if( node[4] < -max_acc ) node[4] = -max_acc;
      if( node[4] > max_acc ) node[4] = max_acc;
      node[5] = (0.5*origin[word][5] + 0.5*node[5]);
      if( node[5] < -max_acc ) node[5] = -max_acc;
      if( node[5] > max_acc ) node[5] = max_acc;

      node[6] += node[3] * td * acc_scale;
      node[7] += node[4] * td * acc_scale;
      node[8] += node[5] * td * acc_scale;
      if( node[6] > max_vel ) node[6] = max_vel;
      if( node[6] < -max_vel ) node[6] = -max_vel;
      if( node[7] > max_vel ) node[7] = max_vel;
      if( node[7] < -max_vel ) node[7] = -max_vel;
      if( node[8] > max_vel ) node[8] = max_vel;
      if( node[8] < -max_vel ) node[8] = -max_vel;

      node[0] += node[6] * td * vel_scale;
      node[1] += node[7] * td * vel_scale;
      node[2] += node[8] * td * vel_scale;

      totaldist = Math.sqrt( node[0]*node[0] + node[1]*node[1] + node[2]*node[2] );
      if( totaldist > max_dist_end ) {
        let remap = new THREE.Vector3( node[0], node[1], node[2] );
        remap.normalize();
        node[0] = remap.x*scaler;
        node[1] = remap.y*scaler;
        node[2] = remap.z*scaler;
        node[3] = node[4] = node[5] = 0;
      }
      let length = Math.sqrt( node[3]*node[3] + node[4]*node[4] + node[5]*node[5] );
      if( length > 10*td ) {
        //console.log("length=" + length, 10*td);
        addDimension(word);
      }
      projectTo3D(word);

      forcemap.move( word, node[0], node[1], node[2] );

  let a = 'a'.charCodeAt(0), A = 'A'.charCodeAt(0), z = 'z'.charCodeAt(0), Z = 'Z'.charCodeAt(0);

let counts={};
let max_words=500, min_word_length=5;
let analyze = function(words) {
  var i;

  graph={};
  let lastwords=[], max_reps=0;
  for( i=0; i<words.length; i++ ) {
    let word = words[i];
    var node, counter;
    if( word.length < min_word_length ) continue;
    if( !(word in graph) ) {
      if( !validWord(word) ) continue;
      graph[word] = { reps: 1, connections: {}, position: [0,0,0], length: 0, sentiment: 0, commonality: 0, definitionClarity: 0.5, binarySum: 0, extraDimensions: [] };
      counts[word] = {};
    } else {
      graph[word].reps++;
      max_reps = Math.max(max_reps, graph[word].reps);
    }
    if( lastwords.length == 10 ) {
      node = graph[word];
      for( var j=0; j<10; j++ ) {
        let w2 = lastwords[j];
        if( !(w2 in counts[word]) ) {
          counts[word][w2]=1;
          node.connections[w2] = Math.abs(100-j*10);
        } else {
          counts[word][w2]++;
          node.connections[w2] += Math.abs(100-j*10);
        }
        if( !(word in counts[w2]) ) {
          counts[w2][word]=1;
          graph[w2].connections[word] = Math.abs(100-j*10);
        } else {
          counts[w2][word]++;
          graph[w2].connections[word] += Math.abs(100-j*10);
        }
      }
      lastwords.shift();
    }
    lastwords.push(word);
  }

  let lst = Object.keys(graph).map( (x) => ( [graph[x].reps,x] ));
  lst.sort( (a,b) => a[0]-b[0] );

  var xx = max_words;
  do {
    if( xx >= lst.length ) break;
    delete graph[ lst[xx][1] ];
  } while( xx++ );

  let maxSum=0;
  for( var word in graph ) {
    let prose = [], dels=[];
    for( var w2 in graph[word].connections ) {
      if( !(w2 in graph) ) {
        dels.push(w2);
        continue;
      }
      let sum = graph[word].connections[w2]/counts[word][w2];
      maxSum = Math.max(maxSum,sum);
      prose.push( w2, sum );
    }
    graph[word].connections = prose;
  }
  for( var word in graph ) {
    for( var w2=0; w2<graph[word].connections.length; w2+=2 ) {
      graph[word].connections[w2+1] /= maxSum;
    }
  }

  console.log(graph['derived']);
}
