<a href='./organ.html?As we made our way we noticed a very large, bright orange and red light, shimmering like blazing fire, on or near the water of Anthony Lake. There are trees growing in the strip of space between the trail and the lake so we did not have a clear line of sight but the trees are spread out enough to see through them pretty well. ____Since fire danger was extreme and there was a burn ban in effect at the time, we worried there was a wildfire starting or that a person had carelessly built a bonfire on the shore so we shined our flash lights in that direction to see better and continued to walk the path. The strange orange light seemed to respond to our flash lights and began to move slowly toward us, similar to a walking pace.____As it moved we could see that it was not coming from a source on the land around the lake and it appeared to be free floating in the air, not attached to anything, hovering about 6 feet above the lake. The distinct orange reflection beneath it on the waters surface was incredibly bright and large, shimmering in the pattern of the rippling waves so it was clear there was no boat or other object beneath it that could have been a source. ____The closer it came toward us the brighter and bigger it appeared. It seemed to be spherical in shape but did not have clearly defined edges as one would expect to see in a solid object. ____The orange and red light emitting from it was intensely brilliant. It appeared almost like a liquid ball of fire, chaotically radiating swirls, shimmers, and flicks of flame, while also holding its shape.____Its size is hard to estimate as it seemed to get larger as it drew near but we think it was at least 10-12 feet in diameter, about the size of a standard circle trampoline frame.____The orb made no sound, the silence of the night was profound. The geology of this area amplifies sound with echos bouncing across the waters of multiple lakes and surrounding mountains so the absence of sound at this time was notable.____While we made these observations and watched the ball of light follow and draw ever closer to us, seemingly growing in size and intensity, we felt an increasing sense of terror as we approached the clearing of the parking lot. '>Fire Orb</a>
