function updateConfig()
{
    let cfg = "";

    for( var i=0; i<models.length; i++ ) {
        if( i != 0 ) cfg += ",";
        cfg += names[i] + "," + copies[i] + "," + volumes[i] + "," + filenames[i];
    }
    localStorage['morecfg'] = cfg;
    loadmorecfg();
}
function loadmorecfg()
{
    var cfg = localStorage['morecfg'];
    if( cfg == defaults ) cfg=moredefaults;
    if( typeof cfg == 'undefined' || cfg == 'undefined' || cfg == '' ) cfg=moredefaults;

    var arr = cfg.split(",");
    names=[];
    copies=[];
    volumes=[];
    filenames=[];
    ptrs = [];
    let sum=0;
    for( var i=0; i<arr.length; i+=3 ) {

        names.push( arr[i] );
        copies.push( parseInt( arr[i+1] ) || 1 );
        ptrs.push( sum );
        sum += copies[ copies.length-1 ];
        volumes.push( parseFloat( arr[i+2] ) || 1.0 );
        if( arr.length > i+3 && isNaN(arr[i+4]) ) {
            filenames.push( arr[i+3] );
            i++;
        } else {
            filenames.push( names[ names.length-1 ] );
        }
    }
    return true;
}

let inexec=false, gravTimeout=50, gravTimer=-1, minTimeout = 10, maxTimeout = 200;
let cpuratio = 0.00025;
let cfg_changed=false;
function animate() {
    if( !running ) return;
    if( inexec ) {
        if( gravTimer == -1 )
            gravTimer = setTimeout( "gravTimer=-1 && animate()", 200 );
        return;
    } else {
        inexec = true;
    }
    var tn = new Date();
    run();
    var tx = new Date();
    var td = (tx - tn)/cpuratio;
    var chg=false;
    if( gravTimeout < td && gravTimeout < maxTimeout ) { // using too much cpu.
        gravTimeout *= 1.5;
        gravTimeout = Math.min(gravTimeout, maxTimeout);
        chg=true;
    } else if( gravTimeout > td*2/3 && gravTimeout > minTimeout ) { // going too slowly.
        gravTimeout /= 1.5;
        gravTimeout = Math.max(gravTimeout, minTimeout);
        chg=true;
    }

    if( cfg_changed ) {
        updateConfig();
        cfg_changed=false;
    }

    gravTimer = setTimeout( "gravTimer=-1 && animate()", gravTimeout );
    if( gravTimeout > 600 )
        console.log("gt="+gravTimeout);

    inexec=false;
}

let last = 0;

let anom_list=[];
let anom_last=false;
function print_anomalies()
{
    for( var i=0; i<anom_list.length && i<anomalies.length; i++ ) {
        anomalies[i].innerHTML = anom_list[i];
    }
}
function record_anomaly(x)
{
    let min = 0.00005;
    if( x < min ) {
        anom_list.unshift(parseInt((min-x)*(1/min)*100));
        if( anom_list.length > anomalies.length ) anom_list.pop();
        print_anomalies();
    }
}
function anomaly_test()
{
    let a = Math.random(), b = Math.random();
    if( anom_last !== false ) {
        record_anomaly(Math.abs(anom_last-a));
    }
    record_anomaly(Math.abs(a-b));
    anom_last=b;
}

function run()
{
    if( !running ) return;

    //requestAnimationFrame(run);
    let now = new Date().getTime() / 1000; 
    var i;

    if( last == 0 ) {
        last = now;
        return;
    }
    var passed = 1/(now-last);
    let unstarted=[];
    for( i=0; i<animations.length; i++ ){ 
        if( animations[i].lastplayed == 0 ) {
            unstarted.push(i);
        }
    }

    let startcount = parseInt(Math.random() * 5.6);
    let starters=[];
    while( startcount > 0 ) {
        let n = Math.floor(Math.random()*(unstarted.length-1));
        starters.push(unstarted[n]);
        unstarted.splice(n,1);
        startcount--;
    }

    for( i=0; i<animations.length; i++ ) {
        let animation = animations[i];
        let sound = sounds[animation.ident0];

        anomaly_test();


        // Update the position based on velocity and time elapsed since last frame
        var sx, sy, sz;
        if( animation._pos != null ) {
            sx = animation._pos.x;
            sy = animation._pos.y;
            sz = animation._pos.z;
        } else {
            sx = sy = sz = 0;
        }

        for( var sc=0; sc<maxscales.length; sc++ ) {
            if( animation.distance >= maxscales[sc] ) {
                if( animation.velocity.x > maxvels[sc] ) animation.velocity.x = maxvels[sc];
                if( animation.velocity.x < -maxvels[sc] ) animation.velocity.x = -maxvels[sc];
                if( animation.velocity.y > maxvels[sc] ) animation.velocity.y = maxvels[sc];
                if( animation.velocity.y < -maxvels[sc] ) animation.velocity.y = -maxvels[sc];
                if( animation.velocity.z > maxvels[sc] ) animation.velocity.z = maxvels[sc];
                if( animation.velocity.z < -maxvels[sc] ) animation.velocity.z = -maxvels[sc];

                if( animation.acc.x > maxaccs[sc] ) animation.acc.x = maxaccs[sc];
                if( animation.acc.x < -maxaccs[sc] ) animation.acc.x = -maxaccs[sc];
                if( animation.acc.y > maxaccs[sc] ) animation.acc.y = maxaccs[sc];
                if( animation.acc.y < -maxaccs[sc] ) animation.acc.y = -maxaccs[sc];
                if( animation.acc.z > maxaccs[sc] ) animation.acc.z = maxaccs[sc];
                if( animation.acc.z < -maxaccs[sc] ) animation.acc.z = -maxaccs[sc];
            }
        }

        let vx = 0+animation.velocity.x;
        let vy = 0+animation.velocity.y;
        let vz = 0+animation.velocity.z;

        if( damping ) {
            if( animation.distance < 5 ) {
                let max_scale = 50;
                let min_scale = 10;
                let max_range = 5;
                let min_range = 1;
                var dist;

                if( animation.distance < 3 ) {
                    max_scale = max_range;
                    min_scale = min_range;
                    max_range = 0.5;
                    min_range = 0.1;
                    if( animation.distance < 1.5 ) {
                        max_scale = max_range;
                        min_scale = min_range;
                        max_range = 0.05;
                        min_range = 0.01;
                    }
                }

                dist = vx > 0 ? vx : -vx;
                dist = dist > max_scale ? max_range : ( dist < min_scale ? min_range : ( (dist-min_scale)/(max_scale-min_scale) ) );
                vx = (vx>0?1:-1) * ( min_range + (dist * ( max_range - min_range ) ) );
                dist = vy > 0 ? vy : -vy;
                dist = dist > max_scale ? max_range : ( dist < min_scale ? min_range : ( (dist-min_scale)/(max_scale-min_scale) ) );
                vy = (vx>0?1:-1) * ( min_range + (dist * ( max_range - min_range ) ) );
                dist = vz > 0 ? vz : -vz;
                dist = dist > max_scale ? max_range : ( dist < min_scale ? min_range : ( (dist-min_scale)/(max_scale-min_scale) ) );
                vz = (vx>0?1:-1) * ( min_range + (dist * ( max_range - min_range ) ) );
            }
        }


        let asx = sx + vx * passed;
        let asy = sy + vy * passed;
        let asz = sz + vz * passed;

        let newdist = Math.sqrt( asx*asx + asy*asy + asz*asz );

        if( newdist > maxdist ) {
            if( asx > maxdist ) asx = maxdist;
            if( asx < -maxdist ) asx = -maxdist;
            if( asy > maxdist ) asy = maxdist;
            if( asy < -maxdist ) asy = -maxdist;
            if( asz > maxdist ) asz = maxdist;
            if( asz < -maxdist ) asz = -maxdist;
        }

        animation._pos = {x:0+asx,y:0+asy,z:0+asz};
        animation.distance = newdist;

        let v = volumes[animation.ident];
        if( v > 1 ) {
            asx /= v;
            asy /= v;
            asz /= v;

            if( Math.abs(asx) < min_dist ) asx = min_dist;
            if( Math.abs(asy) < min_dist ) asy = min_dist;
            if( Math.abs(asz) < min_dist ) asz = min_dist;
        }
        sound.pos(asx,asy,asz);

        let sinceplayed = now - ( animation.lastplayed + animation.duration );
        if( animation.lastplayed == 0 ) {
            if( starters.indexOf(i) >= 0 ) {
                sinceplayed = animation.duration*pause_k + animation.duration*pause_n*0.5 + 100000;
            } else {
                sinceplayed = 0;
            }
        }
        // we might restart the sound.
        if( sinceplayed > 0 ) {
            let done=false;
            if( animation.running ) {
                animation.running=false;
                sound.stop();
                done=true;
                if( hidden ) {
                    labels[i].innerHTML = "[placeholder]";
                    if( labels[i].style.display == 'block' ) labels[i].style.display = 'none';
                } else {
                    let buf = "<button onClick='increaseVolume(" + i + ")' class=fl>+</button>\n" +
                        "<div class=fl>/</div>" +
                        "<button onClick='decreaseVolume(" + i + ")' class=fl>-</button>\n" +
                        "<div class=fl id=ident_" + i + ">" + volumes[animation.ident] + ": " + names[animation.ident] + "</div><div class=fl id=dist_" + i + ">(off)</div>" +
                        "<div class=cl></div>";
                    if( labels[i].style.display == 'none' ) labels[i].style.display = 'block';
                    labels[i].innerHTML = buf;
                }
            }
            if( sinceplayed > animation.duration*pause_k + animation.duration*Math.random()*pause_n ) {
                animation.soundid = sound.play();
                sound.volume( mainVolume * volumes[animation.ident] );
                animation.lastplayed = now;
                animation.running = true;
            }
            if( !done ) {
                labels[i].style.display = 'none';
            }
        } else if( animation.lastplayed != 0 ) {
            var e = gE("dist_" + i);
            let done=false;
            if( labels[i].style.display == 'none' ) labels[i].style.display = 'block';
            else if( e ) {
                e.innerHTML = "(" + animation.distance + ")";
                gE("ident_" + i).innerHTML = volumes[animation.ident] + ": " + names[animation.ident];
                done=true;
            }
            if( !done ) {
                let buf = "<button onClick='increaseVolume(" + i + ")' class=fl>+</button>\n" +
                    "<div class=fl>/</div>" +
                    "<button onClick='decreaseVolume(" + i + ")' class=fl>-</button>\n" +
                     "<div class=fl id=ident_" + i + ">" + volumes[animation.ident] + ": " + names[animation.ident] + "</div><div class=fl id=dist_" + i + ">(" + animation.distance + ")</div>\n" +
                     "<div class=cl></div>";
                labels[i].innerHTML = buf;
            }
        }
        
        // Generate a small change in velocity

        animation.pref.x += ( randZero() * passed * pref_k );
        animation.pref.y += ( randZero() * passed * pref_k );
        animation.pref.z += ( randZero() * passed * pref_k );
        if( animation.pref.x < -maxpref || animation.pref.x > maxpref ) {
            animation.pref.x = Math.min( maxpref, Math.max( -maxpref, animation.pref.x ) );
        }
        if( animation.pref.y < -maxpref || animation.pref.y > maxpref ) {
            animation.pref.y = Math.min( maxpref, Math.max( -maxpref, animation.pref.y ) );
        }
        if( animation.pref.z < -maxpref || animation.pref.z > maxpref ) {
            animation.pref.z = Math.min( maxpref, Math.max( -maxpref, animation.pref.z ) );
        }

        let r = Math.random();
        animation.acc.x += speed * ( r * animation.pref.x * passed );
        animation.acc.y += speed * ( r * animation.pref.y * passed );
        animation.acc.z += speed * ( r * animation.pref.z * passed );

        r = Math.random();
        animation.velocity.x += ( r * animation.acc.x * passed );
        animation.velocity.y += ( r * animation.acc.y * passed );
        animation.velocity.z += ( r * animation.acc.z * passed );
    }
    animations.sort( (a,b) => (a.distance - b.distance) );

    last = now;
}
function increaseVolume(n)
{
    var i = sounds[n].ident;
            
    volumes[i] = Math.min(5,volumes[i]+0.1);

    var end;
    if( i+1 >= ptrs.length ) end = sounds.length;
    else end = ptrs[i+1];
    for( var j=ptrs[i]; j<end; j++ ) {
        sounds[j].volume(mainVolume * volumes[i]);
    }

    cfg_changed=true;
}
function decreaseVolume(n)
{
    var i = sounds[n].ident;

    volumes[i] = Math.max(0,volumes[i]-0.1);

    var end;
    if( i+1 >= ptrs.length ) end = sounds.length;
    else end = ptrs[i+1];
    for( var j=ptrs[i]; j<end; j++ ) {
        sounds[j].volume(mainVolume * volumes[i]);
    }

    cfg_changed=true;
}
function updateVolumes()
{
    var i,j,n;

    for( i=0; i<sounds.length; i++ ) {
        sounds[i].volume(mainVolume * volumes[sounds[i].ident]);
    }

}

function randZero()
{
    return Math.random() - 0.5;
}


function radStartup()
{
    radLoad();
}
registerStartup(radStartup);


</script>
