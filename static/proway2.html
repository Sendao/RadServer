<style>
#yourtoast {

    background-color: #000;
    color: #ddd;
    text-align: center;
    border-radius: 2px;
    padding: 16px;
    position: absolute;
    z-index: 100;
    left: 50%;
    bottom: 30px;
    font-size: 17px;
    transform: translateX(-50%);
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
@keyframes fadeOut {
    from {opacity: 1;}
    to {opacity: 0;}
}
